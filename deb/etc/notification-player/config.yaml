# Notification Player Configuration

server:
  host: "0.0.0.0"
  port: 8080

audio:
  player: "aplay"              # aplay, paplay, mpv, ffplay
  sound_dir: "/usr/share/notification-player/sounds"
  default: "default.wav"
  volume: 80                   # 0-100

security:
  token: ""                    # 留空不启用认证