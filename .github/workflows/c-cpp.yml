name: Build MIPS64el DEB Package (Kylin Source)

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Configure Kylin software sources
      run: |
        # 1. 备份原有源
        sudo cp /etc/apt/sources.list /etc/apt/sources.list.bak
        
        # 2. 配置麒麟V10 SP1的源（适用于mips64el）
        sudo tee /etc/apt/sources.list << 'EOF'
        # 麒麟V10 SP1 软件源（mips64el架构）
        deb https://update.cs2c.com.cn/NS/V10/V10SP1.1/os/adv/lic/updates/mips64el/ ./
        deb https://update.cs2c.com.cn/NS/V10/V10SP1.1/os/adv/lic/updates/mips64el/ updates/
        EOF
        
        # 3. 添加mips64el架构支持
        sudo dpkg --add-architecture mips64el
        
        # 4. 更新源列表
        sudo apt-get update || true
        
    - name: Install cross-compilation toolchain and dependencies
      run: |
        # 5. 安装交叉编译工具链
        sudo apt-get install -y \
          gcc-mips64el-linux-gnuabi64 \
          g++-mips64el-linux-gnuabi64 \
          binutils-mips64el-linux-gnuabi64 \
          dpkg-dev \
          debhelper \
          fakeroot \
          file \
          lintian \
          sox \
          libsox-dev \
          pkg-config \
          libpulse-dev \
          libasound2-dev \
          libjson-c-dev || true
        
        # 6. 验证安装
        echo "=== 验证交叉编译工具链 ==="
        mips64el-linux-gnuabi64-gcc --version || echo "gcc not found"
        mips64el-linux-gnuabi64-g++ --version || echo "g++ not found"
        
        # 7. 检查源文件
        echo "=== 检查源文件 ==="
        ls -la src/ || echo "src directory not found"
        
    - name: Create missing source files
      run: |
        # 检查src目录是否存在，如果不存在则创建
        mkdir -p src
        
        # 检查并创建缺失的源文件
        if [ ! -f src/main.c ]; then
          echo "Creating src/main.c"
          cat > src/main.c << 'MAIN_EOF'
        #include <stdio.h>
        #include <stdlib.h>
        #include <string.h>
        #include <unistd.h>
        #include <signal.h>
        #include <pthread.h>
        #include <syslog.h>
        #include <getopt.h>
        #include "http_server.h"
        #include "audio.h"
        #include "config.h"
        
        #define VERSION "1.0.0"
        #define DEFAULT_CONFIG "/etc/notification-client/config.json"
        
        static int running = 1;
        
        void signal_handler(int sig) {
            if (sig == SIGINT || sig == SIGTERM) {
                syslog(LOG_INFO, "Received termination signal, shutting down...");
                running = 0;
            }
        }
        
        void daemonize() {
            pid_t pid = fork();
            if (pid < 0) {
                perror("fork");
                exit(1);
            }
            if (pid > 0) {
                exit(0);
            }
            
            umask(0);
            
            if (setsid() < 0) {
                perror("setsid");
                exit(1);
            }
            
            close(STDIN_FILENO);
            close(STDOUT_FILENO);
            close(STDERR_FILENO);
            
            openlog("notification-client", LOG_PID, LOG_DAEMON);
        }
        
        void print_usage(char *prog) {
            printf("Usage: %s [OPTIONS]\n", prog);
            printf("Options:\n");
            printf("  -c, --config FILE   Configuration file path\n");
            printf("  -d, --daemon        Run as daemon\n");
            printf("  -p, --port PORT     HTTP server port (default: 8080)\n");
            printf("  -h, --help          Show this help message\n");
            printf("  -v, --version       Show version information\n");
        }
        
        int main(int argc, char *argv[]) {
            char *config_path = DEFAULT_CONFIG;
            int daemon_mode = 0;
            int http_port = 8080;
            
            static struct option long_options[] = {
                {"config", required_argument, 0, 'c'},
                {"daemon", no_argument, 0, 'd'},
                {"port", required_argument, 0, 'p'},
                {"help", no_argument, 0, 'h'},
                {"version", no_argument, 0, 'v'},
                {0, 0, 0, 0}
            };
            
            int opt;
            while ((opt = getopt_long(argc, argv, "c:dp:hv", long_options, NULL)) != -1) {
                switch (opt) {
                    case 'c':
                        config_path = optarg;
                        break;
                    case 'd':
                        daemon_mode = 1;
                        break;
                    case 'p':
                        http_port = atoi(optarg);
                        break;
                    case 'h':
                        print_usage(argv[0]);
                        return 0;
                    case 'v':
                        printf("Notification Client v%s\n", VERSION);
                        return 0;
                    default:
                        print_usage(argv[0]);
                        return 1;
                }
            }
            
            if (daemon_mode) {
                daemonize();
            }
            
            // Initialize audio system
            if (audio_init() < 0) {
                syslog(LOG_ERR, "Failed to initialize audio system");
                return 1;
            }
            
            // Load configuration
            if (load_config(config_path) < 0) {
                syslog(LOG_WARNING, "Using default configuration");
            }
            
            // Register signal handlers
            signal(SIGINT, signal_handler);
            signal(SIGTERM, signal_handler);
            signal(SIGHUP, signal_handler);
            
            // Start HTTP server
            syslog(LOG_INFO, "Starting notification client v%s on port %d", VERSION, http_port);
            
            http_server_t *server = http_server_create(http_port);
            if (!server) {
                syslog(LOG_ERR, "Failed to create HTTP server");
                audio_cleanup();
                return 1;
            }
            
            // Main loop
            while (running) {
                http_server_poll(server, 100);
            }
            
            // Cleanup
            http_server_destroy(server);
            audio_cleanup();
            syslog(LOG_INFO, "Notification client stopped");
            closelog();
            
            return 0;
        }
        MAIN_EOF
        fi
        
        if [ ! -f src/audio.c ]; then
          echo "Creating src/audio.c"
          cat > src/audio.c << 'AUDIO_EOF'
        #include "audio.h"
        #include <stdio.h>
        #include <stdlib.h>
        #include <string.h>
        #include <unistd.h>
        #include <pthread.h>
        #include <syslog.h>
        #include <sys/types.h>
        #include <sys/stat.h>
        #include <fcntl.h>
        
        static int audio_initialized = 0;
        static int current_volume = 80;
        static pthread_mutex_t audio_mutex = PTHREAD_MUTEX_INITIALIZER;
        
        int audio_init(void) {
            pthread_mutex_lock(&audio_mutex);
            if (audio_initialized) {
                pthread_mutex_unlock(&audio_mutex);
                return 0;
            }
            audio_initialized = 1;
            syslog(LOG_INFO, "Audio system initialized");
            pthread_mutex_unlock(&audio_mutex);
            return 0;
        }
        
        void audio_cleanup(void) {
            pthread_mutex_lock(&audio_mutex);
            audio_initialized = 0;
            syslog(LOG_INFO, "Audio system cleaned up");
            pthread_mutex_unlock(&audio_mutex);
        }
        
        int audio_play(const char *filename, int force_wakeup) {
            if (!filename) {
                syslog(LOG_ERR, "No audio file specified");
                return -1;
            }
            
            if (access(filename, R_OK) != 0) {
                syslog(LOG_ERR, "Audio file not found: %s", filename);
                return -1;
            }
            
            pthread_mutex_lock(&audio_mutex);
            if (!audio_initialized) {
                syslog(LOG_ERR, "Audio system not initialized");
                pthread_mutex_unlock(&audio_mutex);
                return -1;
            }
            
            char command[512];
            if (force_wakeup) {
                snprintf(command, sizeof(command), 
                        "systemd-inhibit --why=\"Notification\" --mode=block sleep 1 && aplay \"%s\" 2>/dev/null || paplay \"%s\" 2>/dev/null",
                        filename, filename);
            } else {
                snprintf(command, sizeof(command), 
                        "aplay \"%s\" 2>/dev/null || paplay \"%s\" 2>/dev/null", filename, filename);
            }
            
            syslog(LOG_INFO, "Playing audio: %s (force_wakeup=%d)", filename, force_wakeup);
            int result = system(command);
            pthread_mutex_unlock(&audio_mutex);
            return (result == 0) ? 0 : -1;
        }
        
        void audio_stop(void) {
            system("pkill -f aplay 2>/dev/null");
            system("pkill -f paplay 2>/dev/null");
        }
        
        void audio_set_volume(int volume) {
            if (volume < 0) volume = 0;
            if (volume > 100) volume = 100;
            current_volume = volume;
            char command[128];
            snprintf(command, sizeof(command), 
                    "amixer set Master %d%% 2>/dev/null || pactl set-sink-volume @DEFAULT_SINK@ %d%% 2>/dev/null",
                    volume, volume);
            system(command);
        }
        
        int audio_get_volume(void) {
            return current_volume;
        }
        
        int audio_check_device(void) {
            int result = system("aplay -l 2>/dev/null | grep -q card");
            if (result != 0) {
                result = system("pactl info > /dev/null 2>&1");
            }
            return (result == 0) ? 1 : 0;
        }
        AUDIO_EOF
        fi
        
        if [ ! -f src/audio.h ]; then
          echo "Creating src/audio.h"
          cat > src/audio.h << 'AUDIOH_EOF'
        #ifndef AUDIO_H
        #define AUDIO_H
        
        #include <stdint.h>
        
        int audio_init(void);
        void audio_cleanup(void);
        int audio_play(const char *filename, int force_wakeup);
        void audio_stop(void);
        void audio_set_volume(int volume);
        int audio_get_volume(void);
        int audio_check_device(void);
        
        #endif
        AUDIOH_EOF
        fi
        
        if [ ! -f src/http_server.c ]; then
          echo "Creating src/http_server.c"
          cat > src/http_server.c << 'HTTP_EOF'
        #include "http_server.h"
        #include <stdio.h>
        #include <stdlib.h>
        #include <string.h>
        #include <unistd.h>
        #include <sys/socket.h>
        #include <netinet/in.h>
        #include <arpa/inet.h>
        #include <pthread.h>
        #include <syslog.h>
        #include <time.h>
        #include "audio.h"
        #include "config.h"
        
        #define BUFFER_SIZE 8192
        #define MAX_HEADERS 64
        
        struct http_server_s {
            int socket_fd;
            int port;
            int running;
        };
        
        typedef struct {
            char method[16];
            char path[256];
            char version[16];
            int header_count;
            char body[2048];
            int content_length;
        } http_request_t;
        
        typedef struct {
            int status_code;
            char *content_type;
            char *body;
        } http_response_t;
        
        static void send_response(int client_fd, http_response_t *resp) {
            char header[512];
            snprintf(header, sizeof(header),
                    "HTTP/1.1 %d OK\r\n"
                    "Content-Type: %s\r\n"
                    "Content-Length: %zu\r\n"
                    "Connection: close\r\n"
                    "\r\n",
                    resp->status_code,
                    resp->content_type ? resp->content_type : "application/json",
                    resp->body ? strlen(resp->body) : 0);
            
            send(client_fd, header, strlen(header), 0);
            if (resp->body) {
                send(client_fd, resp->body, strlen(resp->body), 0);
            }
        }
        
        static void handle_api_request(int client_fd, const char *path, const char *body) {
            http_response_t resp;
            resp.content_type = "application/json";
            
            char response_body[2048] = {0};
            
            if (strcmp(path, "/api/play") == 0) {
                const char *sound_file = "/usr/share/notification-client/sounds/default.wav";
                int force_wakeup = 0;
                
                // Simple JSON parsing - in production use json-c
                if (body && strstr(body, "force_wakeup")) {
                    force_wakeup = 1;
                }
                
                int result = audio_play(sound_file, force_wakeup);
                snprintf(response_body, sizeof(response_body),
                        "{\"action\":\"play\",\"success\":%s,\"force_wakeup\":%s}",
                        result == 0 ? "true" : "false",
                        force_wakeup ? "true" : "false");
                resp.status_code = result == 0 ? 200 : 500;
                
            } else if (strcmp(path, "/api/stop") == 0) {
                audio_stop();
                snprintf(response_body, sizeof(response_body),
                        "{\"action\":\"stop\",\"success\":true}");
                resp.status_code = 200;
                
            } else if (strcmp(path, "/api/status") == 0) {
                int device_available = audio_check_device();
                snprintf(response_body, sizeof(response_body),
                        "{\"status\":\"running\",\"device_available\":%s,\"volume\":%d}",
                        device_available ? "true" : "false",
                        audio_get_volume());
                resp.status_code = 200;
                
            } else if (strcmp(path, "/api/info") == 0) {
                snprintf(response_body, sizeof(response_body),
                        "{\"name\":\"Notification Client\",\"version\":\"1.0.0\",\"arch\":\"mips64el\"}");
                resp.status_code = 200;
                
            } else {
                snprintf(response_body, sizeof(response_body),
                        "{\"error\":\"Endpoint not found\"}");
                resp.status_code = 404;
            }
            
            resp.body = response_body;
            send_response(client_fd, &resp);
        }
        
        static void* client_handler(void *arg) {
            int client_fd = *(int*)arg;
            free(arg);
            
            char buffer[BUFFER_SIZE];
            memset(buffer, 0, BUFFER_SIZE);
            
            int bytes = recv(client_fd, buffer, BUFFER_SIZE - 1, 0);
            if (bytes > 0) {
                char method[16] = {0}, path[256] = {0};
                if (sscanf(buffer, "%15s %255s", method, path) == 2) {
                    char *body = strstr(buffer, "\r\n\r\n");
                    if (body) body += 4;
                    if (strcmp(method, "GET") == 0 || strcmp(method, "POST") == 0) {
                        handle_api_request(client_fd, path, body);
                    }
                }
            }
            
            close(client_fd);
            return NULL;
        }
        
        http_server_t* http_server_create(int port) {
            http_server_t *server = malloc(sizeof(http_server_t));
            if (!server) return NULL;
            
            server->port = port;
            server->running = 1;
            
            server->socket_fd = socket(AF_INET, SOCK_STREAM, 0);
            if (server->socket_fd < 0) {
                perror("socket");
                free(server);
                return NULL;
            }
            
            int opt = 1;
            setsockopt(server->socket_fd, SOL_SOCKET, SO_REUSEADDR, &opt, sizeof(opt));
            
            struct sockaddr_in addr;
            memset(&addr, 0, sizeof(addr));
            addr.sin_family = AF_INET;
            addr.sin_addr.s_addr = INADDR_ANY;
            addr.sin_port = htons(port);
            
            if (bind(server->socket_fd, (struct sockaddr*)&addr, sizeof(addr)) < 0) {
                perror("bind");
                close(server->socket_fd);
                free(server);
                return NULL;
            }
            
            if (listen(server->socket_fd, 10) < 0) {
                perror("listen");
                close(server->socket_fd);
                free(server);
                return NULL;
            }
            
            syslog(LOG_INFO, "HTTP server listening on port %d", port);
            return server;
        }
        
        void http_server_destroy(http_server_t *server) {
            if (!server) return;
            server->running = 0;
            close(server->socket_fd);
            free(server);
        }
        
        void http_server_poll(http_server_t *server, int timeout_ms) {
            if (!server || !server->running) return;
            
            fd_set read_fds;
            FD_ZERO(&read_fds);
            FD_SET(server->socket_fd, &read_fds);
            
            struct timeval tv = {
                .tv_sec = timeout_ms / 1000,
                .tv_usec = (timeout_ms % 1000) * 1000
            };
            
            int ready = select(server->socket_fd + 1, &read_fds, NULL, NULL, &tv);
            if (ready > 0 && FD_ISSET(server->socket_fd, &read_fds)) {
                struct sockaddr_in client_addr;
                socklen_t addr_len = sizeof(client_addr);
                int client_fd = accept(server->socket_fd, (struct sockaddr*)&client_addr, &addr_len);
                
                if (client_fd > 0) {
                    pthread_t thread;
                    int *fd_ptr = malloc(sizeof(int));
                    *fd_ptr = client_fd;
                    pthread_create(&thread, NULL, client_handler, fd_ptr);
                    pthread_detach(thread);
                }
            }
        }
        
        int http_server_get_port(http_server_t *server) {
            return server ? server->port : -1;
        }
        HTTP_EOF
        fi
        
        if [ ! -f src/http_server.h ]; then
          echo "Creating src/http_server.h"
          cat > src/http_server.h << 'HTTPH_EOF'
        #ifndef HTTP_SERVER_H
        #define HTTP_SERVER_H
        
        #include <stdint.h>
        
        typedef struct http_server_s http_server_t;
        
        http_server_t* http_server_create(int port);
        void http_server_destroy(http_server_t *server);
        void http_server_poll(http_server_t *server, int timeout_ms);
        int http_server_get_port(http_server_t *server);
        
        #endif
        HTTPH_EOF
        fi
        
        if [ ! -f src/config.c ]; then
          echo "Creating src/config.c"
          cat > src/config.c << 'CONFIG_EOF'
        #include "config.h"
        #include <stdio.h>
        #include <stdlib.h>
        #include <string.h>
        #include <syslog.h>
        
        static app_config_t config;
        static int config_loaded = 0;
        
        void set_default_config(void) {
            memset(&config, 0, sizeof(config));
            strcpy(config.default_sound, "/usr/share/notification-client/sounds/default.wav");
            config.default_volume = 80;
            config.http_port = 8080;
            strcpy(config.audio_device, "default");
            config.enable_wakeup = 1;
            config.custom_sound_count = 0;
        }
        
        int load_config(const char *path) {
            set_default_config();
            config_loaded = 1;
            syslog(LOG_INFO, "Using default configuration");
            return 0;
        }
        
        app_config_t* get_config(void) {
            if (!config_loaded) {
                set_default_config();
                config_loaded = 1;
            }
            return &config;
        }
        
        int save_config(const char *path) {
            return 0;
        }
        CONFIG_EOF
        fi
        
        if [ ! -f src/config.h ]; then
          echo "Creating src/config.h"
          cat > src/config.h << 'CONFIGH_EOF'
        #ifndef CONFIG_H
        #define CONFIG_H
        
        #include <stdint.h>
        
        typedef struct {
            char default_sound[256];
            int default_volume;
            int http_port;
            char audio_device[128];
            int enable_wakeup;
            char custom_sounds[10][256];
            int custom_sound_count;
        } app_config_t;
        
        int load_config(const char *path);
        app_config_t* get_config(void);
        int save_config(const char *path);
        void set_default_config(void);
        
        #endif
        CONFIGH_EOF
        fi
        
        echo "=== 检查创建的文件 ==="
        ls -la src/
        
    - name: Setup cross-compilation environment
      run: |
        echo "CC=mips64el-linux-gnuabi64-gcc" >> $GITHUB_ENV
        echo "CXX=mips64el-linux-gnuabi64-g++" >> $GITHUB_ENV
        echo "AR=mips64el-linux-gnuabi64-ar" >> $GITHUB_ENV
        echo "STRIP=mips64el-linux-gnuabi64-strip" >> $GITHUB_ENV
        
        echo "=== 环境变量 ==="
        env | grep -E "(CC|CXX|AR|STRIP)"
        
    - name: Create Makefile
      run: |
        cat > Makefile << 'MAKEFILE_EOF'
        CC = mips64el-linux-gnuabi64-gcc
        CXX = mips64el-linux-gnuabi64-g++
        AR = mips64el-linux-gnuabi64-ar
        STRIP = mips64el-linux-gnuabi64-strip
        
        CFLAGS = -Wall -O2 -march=mips64el -mtune=mips64el -D_GNU_SOURCE
        LDFLAGS = -lpthread
        
        SOURCES = src/main.c src/audio.c src/http_server.c src/config.c
        OBJECTS = $(SOURCES:.c=.o)
        TARGET = notification-client
        
        all: $(TARGET)
        
        $(TARGET): $(OBJECTS)
        	$(CC) $(CFLAGS) -o $@ $^ $(LDFLAGS)
        	@echo "Build complete: $@"
        	@file $@
        
        %.o: %.c
        	$(CC) $(CFLAGS) -c $< -o $@
        
        clean:
        	rm -f $(OBJECTS)
        	rm -rf $(TARGET)
        	rm -f notification-client_*.deb
        	rm -rf package/
        MAKEFILE_EOF
        
        echo "=== Makefile content ==="
        cat Makefile
        
    - name: Build binary
      run: |
        make clean
        make
        file notification-client
        
    - name: Create DEB package structure
      run: |
        mkdir -p package/DEBIAN
        mkdir -p package/usr/bin
        mkdir -p package/etc/notification-client
        mkdir -p package/usr/share/notification-client/sounds
        mkdir -p package/lib/systemd/system
        mkdir -p package/usr/share/doc/notification-client
        
        cp notification-client package/usr/bin/
        ${STRIP} package/usr/bin/notification-client 2>/dev/null || true
        
        cat > package/etc/notification-client/config.json << 'EOF'
        {
          "default_sound": "/usr/share/notification-client/sounds/default.wav",
          "default_volume": 80,
          "http_port": 8080,
          "audio_device": "default",
          "enable_wakeup": true,
          "custom_sounds": []
        }
        EOF
        
        if command -v sox > /dev/null; then
          sox -n package/usr/share/notification-client/sounds/default.wav synth 0.5 sine 800 2>/dev/null || true
        fi
        
        cat > package/lib/systemd/system/notification-client.service << 'SERVICE_EOF'
        [Unit]
        Description=Notification Client Service
        After=network.target sound.target
        Wants=network.target

        [Service]
        Type=simple
        User=nobody
        Group=nogroup
        ExecStart=/usr/bin/notification-client -d -c /etc/notification-client/config.json
        Restart=always
        RestartSec=10
        StandardOutput=syslog
        StandardError=syslog
        SyslogIdentifier=notification-client

        [Install]
        WantedBy=multi-user.target
        SERVICE_EOF
        
    - name: Create DEBIAN control files
      run: |
        VERSION="1.0.0"
        if [ -n "${{ github.ref_type }}" ] && [ "${{ github.ref_type }}" = "tag" ]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        fi
        
        cat > package/DEBIAN/control << CONTROL_EOF
        Package: notification-client
        Version: ${VERSION}
        Section: sound
        Priority: optional
        Architecture: mips64el
        Maintainer: ${GITHUB_ACTOR} <${GITHUB_ACTOR}@users.noreply.github.com>
        Depends: libc6 (>= 2.28), systemd
        Suggests: sox, alsa-utils, pulseaudio
        Description: Notification audio playback client with HTTP API
         This package provides a daemon that plays notification sounds
         triggered via HTTP API. Features include:
          - HTTP REST API for remote triggering
          - Auto-start at boot
          - Force wakeup capability
          - Volume control
          - Custom sound support
          - Systemd integration
        Homepage: https://github.com/${GITHUB_REPOSITORY}
        CONTROL_EOF
        
        cat > package/DEBIAN/postinst << 'POSTINST_EOF'
        #!/bin/bash
        set -e
        case "$1" in
            configure)
                mkdir -p /etc/notification-client
                mkdir -p /usr/share/notification-client/sounds
                if [ ! -f /usr/share/notification-client/sounds/default.wav ] && command -v sox > /dev/null; then
                    sox -n /usr/share/notification-client/sounds/default.wav synth 0.5 sine 800 2>/dev/null || true
                fi
                systemctl daemon-reload 2>/dev/null || true
