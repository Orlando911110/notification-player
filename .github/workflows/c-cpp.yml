name: Build MIPS64 DEB

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install MIPS64 toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-mips64-linux-gnuabi64 cmake
    
    - name: Build
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_C_COMPILER=mips64-linux-gnuabi64-gcc \
          -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)
        file player-client
    
    - name: Prepare DEB
      run: |
        PKG="player-client_1.0.2_mips64"
        mkdir -p "${PKG}/DEBIAN"
        mkdir -p "${PKG}/usr/local/bin"
        mkdir -p "${PKG}/usr/share/player-client/sounds"
        mkdir -p "${PKG}/etc/player-client"
        mkdir -p "${PKG}/lib/systemd/system"
        mkdir -p "${PKG}/usr/share/doc/player-client"
        
        cp build/player-client "${PKG}/usr/local/bin/"
        chmod 755 "${PKG}/usr/local/bin/player-client"
        
        cp debian/player-client.service "${PKG}/lib/systemd/system/"
        
        echo '{"port":8080,"sound_dir":"/usr/share/player-client/sounds","default_volume":80}' > "${PKG}/etc/player-client/config.json"
        touch "${PKG}/usr/share/player-client/sounds/default.wav"
        
        SIZE=$(du -sk "${PKG}" | cut -f1)
        
        cat > "${PKG}/DEBIAN/control" << EOF
        Package: player-client
        Version: 1.0.2
        Architecture: mips64
        Maintainer: PlayerClient Team <support@playerclient.com>
        Installed-Size: ${SIZE}
        Depends: libc6 (>= 2.17)
        Recommends: alsa-utils, pulseaudio-utils, sox
        Section: sound
        Priority: optional
        Homepage: https://github.com/${GITHUB_REPOSITORY}
        Description: 消息通知播放客户端 (MIPS64)
         PlayerClient 是一个轻量级的 HTTP API 音频播放服务器。
         .
         功能特点：
         - RESTful HTTP API
         - 远程触发音频播放
         - 音量控制
         - 支持 ALSA/PulseAudio/SoX
         - 零外部依赖
        EOF
        
        cat > "${PKG}/DEBIAN/postinst" << 'SCRIPT'
        #!/bin/bash
        set -e
        if [ -x "/bin/systemctl" ]; then
            systemctl daemon-reload
            systemctl enable player-client.service 2>/dev/null || true
        fi
        echo "PlayerClient 安装完成！"
        echo "启动服务: sudo systemctl start player-client"
        echo "API 地址: http://localhost:8080"
        exit 0
        SCRIPT
        
        cat > "${PKG}/DEBIAN/prerm" << 'SCRIPT'
        #!/bin/bash
        set -e
        if [ -x "/bin/systemctl" ]; then
            systemctl stop player-client.service 2>/dev/null || true
            systemctl disable player-client.service 2>/dev/null || true
        fi
        exit 0
        SCRIPT
        
        chmod 755 "${PKG}/DEBIAN/postinst" "${PKG}/DEBIAN/prerm"
    
    - name: Build DEB package
      run: |
        dpkg-deb --build player-client_1.0.2_mips64
        dpkg-deb --info player-client_1.0.2_mips64.deb
        dpkg-deb --contents player-client_1.0.2_mips64.deb
    
    - name: Upload DEB package
      uses: actions/upload-artifact@v4
      with:
        name: player-client-mips64-deb
        path: player-client_1.0.2_mips64.deb
        retention-days: 30
