name: Build MIPS64el DEB Package (Kylin Source - Optimized)

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Configure Kylin software sources
      run: |
        sudo cp /etc/apt/sources.list /etc/apt/sources.list.bak
        sudo tee /etc/apt/sources.list << 'EOF'
        # 麒麟V10 SP1 软件源
        deb https://update.cs2c.com.cn/NS/V10/V10SP1.1/os/adv/lic/updates/mips64el/ ./
        deb https://update.cs2c.com.cn/NS/V10/V10SP1.1/os/adv/lic/updates/mips64el/ updates/
        EOF
        sudo dpkg --add-architecture mips64el
        sudo apt-get update || true
        
    - name: Install cross-compilation toolchain
      run: |
        sudo apt-get install -y \
          gcc-mips64el-linux-gnuabi64 \
          g++-mips64el-linux-gnuabi64 \
          binutils-mips64el-linux-gnuabi64 \
          dpkg-dev \
          debhelper \
          fakeroot \
          file \
          lintian \
          sox \
          libsox-dev \
          pkg-config \
          libasound2-dev \
          libpulse-dev \
          libjson-c-dev || true
        
        echo "=== 验证交叉编译工具链 ==="
        mips64el-linux-gnuabi64-gcc --version || echo "gcc not found"
        
    - name: Create all source files
      run: |
        mkdir -p src
        
        # ============================================
        # audio_worker.h
        # ============================================
        cat > src/audio_worker.h << 'AUDIO_WORKER_H_EOF'
        #ifndef AUDIO_WORKER_H
        #define AUDIO_WORKER_H
        
        #include <stdint.h>
        #include <pthread.h>
        
        typedef enum {
            AUDIO_CMD_PLAY,
            AUDIO_CMD_STOP,
            AUDIO_CMD_SET_VOLUME,
            AUDIO_CMD_GET_VOLUME,
            AUDIO_CMD_CHECK_DEVICE
        } audio_command_type_t;
        
        typedef struct {
            audio_command_type_t type;
            char sound_file[256];
            int force_wakeup;
            int volume;
            int result;
            int completed;
            pthread_cond_t cond;
            pthread_mutex_t mutex;
        } audio_job_t;
        
        int audio_worker_init(int num_workers);
        void audio_worker_cleanup(void);
        int audio_play_async(const char *filename, int force_wakeup);
        int audio_play_sync(const char *filename, int force_wakeup);
        void audio_stop_async(void);
        void audio_set_volume_async(int volume);
        int audio_get_volume_sync(void);
        int audio_check_device_sync(void);
        
        #endif
        AUDIO_WORKER_H_EOF
        
        # ============================================
        # audio_worker.c
        # ============================================
        cat > src/audio_worker.c << 'AUDIO_WORKER_C_EOF'
        #include "audio_worker.h"
        #include <stdio.h>
        #include <stdlib.h>
        #include <string.h>
        #include <unistd.h>
        #include <syslog.h>
        #include <pthread.h>
        #include <errno.h>
        #include <sys/wait.h>
        #include <signal.h>
        
        #define MAX_QUEUE_SIZE 100
        #define MAX_WORKERS 4
        
        typedef struct {
            audio_job_t *jobs[MAX_QUEUE_SIZE];
            int head;
            int tail;
            int count;
            pthread_mutex_t mutex;
            pthread_cond_t not_empty;
            pthread_cond_t not_full;
        } job_queue_t;
        
        static job_queue_t queue;
        static pthread_t workers[MAX_WORKERS];
        static int worker_count = 0;
        static int audio_initialized = 0;
        static int current_volume = 80;
        static pthread_mutex_t volume_mutex = PTHREAD_MUTEX_INITIALIZER;
        
        static int play_audio_external(const char *filename, int force_wakeup) {
            pid_t pid;
            int status;
            
            pid = fork();
            if (pid == 0) {
                if (force_wakeup) {
                    execlp("systemd-inhibit", "systemd-inhibit", 
                           "--why=Notification", "--mode=block", 
                           "sleep", "1", NULL);
                }
                execlp("aplay", "aplay", filename, NULL);
                execlp("paplay", "paplay", filename, NULL);
                exit(1);
            } else if (pid > 0) {
                int timeout = 30;
                while (timeout > 0) {
                    if (waitpid(pid, &status, WNOHANG) > 0) {
                        return WIFEXITED(status) && WEXITSTATUS(status) == 0 ? 0 : -1;
                    }
                    sleep(1);
                    timeout--;
                }
                kill(pid, SIGTERM);
                waitpid(pid, NULL, 0);
                return -1;
            }
            return -1;
        }
        
        static void* audio_worker_thread(void *arg) {
            (void)arg;
            while (1) {
                pthread_mutex_lock(&queue.mutex);
                while (queue.count == 0) {
                    pthread_cond_wait(&queue.not_empty, &queue.mutex);
                }
                audio_job_t *job = queue.jobs[queue.head];
                queue.head = (queue.head + 1) % MAX_QUEUE_SIZE;
                queue.count--;
                pthread_cond_signal(&queue.not_full);
                pthread_mutex_unlock(&queue.mutex);
                
                if (job) {
                    switch (job->type) {
                        case AUDIO_CMD_PLAY:
                            job->result = play_audio_external(job->sound_file, job->force_wakeup);
                            break;
                        case AUDIO_CMD_SET_VOLUME:
                            pthread_mutex_lock(&volume_mutex);
                            current_volume = job->volume;
                            pthread_mutex_unlock(&volume_mutex);
                            {
                                char cmd[128];
                                snprintf(cmd, sizeof(cmd), 
                                        "amixer set Master %d%% 2>/dev/null || pactl set-sink-volume @DEFAULT_SINK@ %d%% 2>/dev/null",
                                        job->volume, job->volume);
                                (void)system(cmd);
                            }
                            job->result = 0;
                            break;
                        default:
                            job->result = -1;
                            break;
                    }
                    pthread_mutex_lock(&job->mutex);
                    job->completed = 1;
                    pthread_cond_signal(&job->cond);
                    pthread_mutex_unlock(&job->mutex);
                }
            }
            return NULL;
        }
        
        int audio_worker_init(int num_workers) {
            if (audio_initialized) return 0;
            if (num_workers <= 0 || num_workers > MAX_WORKERS) num_workers = MAX_WORKERS;
            
            queue.head = 0;
            queue.tail = 0;
            queue.count = 0;
            pthread_mutex_init(&queue.mutex, NULL);
            pthread_cond_init(&queue.not_empty, NULL);
            pthread_cond_init(&queue.not_full, NULL);
            
            worker_count = num_workers;
            for (int i = 0; i < worker_count; i++) {
                if (pthread_create(&workers[i], NULL, audio_worker_thread, NULL) != 0) {
                    syslog(LOG_ERR, "Failed to create audio worker thread %d", i);
                    worker_count = i;
                    break;
                }
            }
            
            audio_initialized = 1;
            syslog(LOG_INFO, "Audio worker initialized with %d threads", worker_count);
            return 0;
        }
        
        void audio_worker_cleanup(void) {
            if (!audio_initialized) return;
            audio_initialized = 0;
            for (int i = 0; i < worker_count; i++) {
                pthread_cancel(workers[i]);
                pthread_join(workers[i], NULL);
            }
            pthread_mutex_destroy(&queue.mutex);
            pthread_cond_destroy(&queue.not_empty);
            pthread_cond_destroy(&queue.not_full);
            syslog(LOG_INFO, "Audio worker cleaned up");
        }
        
        static int enqueue_job(audio_job_t *job) {
            if (!audio_initialized) return -1;
            pthread_mutex_lock(&queue.mutex);
            while (queue.count >= MAX_QUEUE_SIZE) {
                pthread_cond_wait(&queue.not_full, &queue.mutex);
            }
            queue.jobs[queue.tail] = job;
            queue.tail = (queue.tail + 1) % MAX_QUEUE_SIZE;
            queue.count++;
            pthread_cond_signal(&queue.not_empty);
            pthread_mutex_unlock(&queue.mutex);
            return 0;
        }
        
        int audio_play_async(const char *filename, int force_wakeup) {
            audio_job_t *job = malloc(sizeof(audio_job_t));
            if (!job) return -1;
            memset(job, 0, sizeof(audio_job_t));
            job->type = AUDIO_CMD_PLAY;
            strncpy(job->sound_file, filename, 255);
            job->sound_file[255] = '\0';
            job->force_wakeup = force_wakeup;
            job->completed = 1;
            return enqueue_job(job);
        }
        
        int audio_play_sync(const char *filename, int force_wakeup) {
            audio_job_t job;
            memset(&job, 0, sizeof(job));
            job.type = AUDIO_CMD_PLAY;
            strncpy(job.sound_file, filename, 255);
            job.sound_file[255] = '\0';
            job.force_wakeup = force_wakeup;
            job.completed = 0;
            pthread_mutex_init(&job.mutex, NULL);
            pthread_cond_init(&job.cond, NULL);
            
            if (enqueue_job(&job) < 0) {
                pthread_mutex_destroy(&job.mutex);
                pthread_cond_destroy(&job.cond);
                return -1;
            }
            
            pthread_mutex_lock(&job.mutex);
            while (!job.completed) {
                pthread_cond_wait(&job.cond, &job.mutex);
            }
            pthread_mutex_unlock(&job.mutex);
            pthread_mutex_destroy(&job.mutex);
            pthread_cond_destroy(&job.cond);
            return job.result;
        }
        
        void audio_stop_async(void) {
            (void)system("pkill -f aplay 2>/dev/null");
            (void)system("pkill -f paplay 2>/dev/null");
        }
        
        void audio_set_volume_async(int volume) {
            if (volume < 0) volume = 0;
            if (volume > 100) volume = 100;
            audio_job_t *job = malloc(sizeof(audio_job_t));
            if (!job) return;
            memset(job, 0, sizeof(audio_job_t));
            job->type = AUDIO_CMD_SET_VOLUME;
            job->volume = volume;
            job->completed = 1;
            enqueue_job(job);
        }
        
        int audio_get_volume_sync(void) {
            pthread_mutex_lock(&volume_mutex);
            int vol = current_volume;
            pthread_mutex_unlock(&volume_mutex);
            return vol;
        }
        
        int audio_check_device_sync(void) {
            int ret = system("aplay -l 2>/dev/null | grep -q card");
            if (ret != 0) {
                ret = system("pactl info > /dev/null 2>&1");
            }
            return ret == 0 ? 1 : 0;
        }
        AUDIO_WORKER_C_EOF
        
        # ============================================
        # http_server_optimized.h - 修复结构体定义
        # ============================================
        cat > src/http_server_optimized.h << 'HTTP_OPT_H_EOF'
        #ifndef HTTP_SERVER_OPTIMIZED_H
        #define HTTP_SERVER_OPTIMIZED_H
        
        #include <stdint.h>
        
        // 前向声明
        typedef struct http_server_opt_s http_server_opt_t;
        
        // 函数声明
        http_server_opt_t* http_server_opt_create(int port, int max_workers, int max_connections);
        void http_server_opt_destroy(http_server_opt_t *server);
        void http_server_opt_run(http_server_opt_t *server);
        void http_server_opt_stop(http_server_opt_t *server);
        
        #endif
        HTTP_OPT_H_EOF
        
        # ============================================
        # http_server_optimized.c - 修复结构体定义
        # ============================================
        cat > src/http_server_optimized.c << 'HTTP_OPT_C_EOF'
        #include "http_server_optimized.h"
        #include <stdio.h>
        #include <stdlib.h>
        #include <string.h>
        #include <unistd.h>
        #include <sys/socket.h>
        #include <sys/epoll.h>
        #include <netinet/in.h>
        #include <netinet/tcp.h>
        #include <arpa/inet.h>
        #include <pthread.h>
        #include <syslog.h>
        #include <errno.h>
        #include <fcntl.h>
        #include <time.h>
        #include <signal.h>
        #include <poll.h>
        #include "audio_worker.h"
        
        #define MAX_EVENTS 64
        #define BUFFER_SIZE 8192
        #define READ_TIMEOUT_MS 5000
        
        // 定义结构体 - 与头文件匹配
        struct http_server_opt_s {
            int epoll_fd;
            int server_fd;
            int port;
            int running;
            int max_connections;
            int current_connections;
            pthread_t *worker_threads;
            int worker_count;
            pthread_mutex_t conn_mutex;
        };
        
        typedef struct task_s {
            int client_fd;
            struct task_s *next;
        } task_t;
        
        static task_t *task_queue_head = NULL;
        static task_t *task_queue_tail = NULL;
        static pthread_mutex_t task_mutex = PTHREAD_MUTEX_INITIALIZER;
        static pthread_cond_t task_cond = PTHREAD_COND_INITIALIZER;
        
        static void enqueue_task(int client_fd) {
            task_t *task = malloc(sizeof(task_t));
            if (!task) { close(client_fd); return; }
            task->client_fd = client_fd;
            task->next = NULL;
            pthread_mutex_lock(&task_mutex);
            if (task_queue_tail) {
                task_queue_tail->next = task;
            } else {
                task_queue_head = task;
            }
            task_queue_tail = task;
            pthread_cond_signal(&task_cond);
            pthread_mutex_unlock(&task_mutex);
        }
        
        static int dequeue_task(void) {
            pthread_mutex_lock(&task_mutex);
            while (!task_queue_head) {
                pthread_cond_wait(&task_cond, &task_mutex);
            }
            task_t *task = task_queue_head;
            task_queue_head = task->next;
            if (!task_queue_head) task_queue_tail = NULL;
            int fd = task->client_fd;
            free(task);
            pthread_mutex_unlock(&task_mutex);
            return fd;
        }
        
        static int read_all(int fd, char *buffer, size_t *len, size_t max_len, int timeout_ms) {
            struct pollfd pfd = {.fd = fd, .events = POLLIN};
            size_t total = 0;
            while (total < max_len) {
                int ret = poll(&pfd, 1, timeout_ms);
                if (ret <= 0) return -1;
                ssize_t n = read(fd, buffer + total, max_len - total);
                if (n <= 0) return -1;
                total += n;
                if (total >= 4 && strstr(buffer, "\r\n\r\n")) break;
            }
            *len = total;
            return 0;
        }
        
        static int write_all(int fd, const char *buffer, size_t len, int timeout_ms) {
            size_t sent = 0;
            struct pollfd pfd = {.fd = fd, .events = POLLOUT};
            while (sent < len) {
                int ret = poll(&pfd, 1, timeout_ms);
                if (ret <= 0) return -1;
                ssize_t n = write(fd, buffer + sent, len - sent);
                if (n <= 0) return -1;
                sent += n;
            }
            return 0;
        }
        
        static void handle_request(int client_fd, char *buffer, size_t len) {
            (void)len;
            char method[16] = {0}, path[256] = {0};
            char response[4096] = {0};
            int status = 200;
            
            if (sscanf(buffer, "%15s %255s", method, path) != 2) {
                close(client_fd);
                return;
            }
            
            char *body = strstr(buffer, "\r\n\r\n");
            if (body) body += 4;
            
            if (strcmp(path, "/api/play") == 0) {
                const char *sound = "/usr/share/notification-client/sounds/default.wav";
                int force = (body && strstr(body, "force_wakeup")) ? 1 : 0;
                int result = audio_play_async(sound, force);
                snprintf(response, sizeof(response),
                        "{\"action\":\"play\",\"success\":%s,\"async\":true}",
                        result == 0 ? "true" : "false");
                status = result == 0 ? 200 : 500;
            } else if (strcmp(path, "/api/stop") == 0) {
                audio_stop_async();
                snprintf(response, sizeof(response), "{\"action\":\"stop\",\"success\":true}");
            } else if (strcmp(path, "/api/volume") == 0) {
                if (body && strstr(body, "volume")) {
                    int vol = atoi(strstr(body, "volume") + 7);
                    audio_set_volume_async(vol);
                    snprintf(response, sizeof(response), "{\"volume\":%d,\"success\":true}", vol);
                } else {
                    int vol = audio_get_volume_sync();
                    snprintf(response, sizeof(response), "{\"volume\":%d}", vol);
                }
            } else if (strcmp(path, "/api/status") == 0) {
                int device = audio_check_device_sync();
                snprintf(response, sizeof(response),
                        "{\"status\":\"running\",\"device_available\":%s,\"volume\":%d}",
                        device ? "true" : "false", audio_get_volume_sync());
            } else if (strcmp(path, "/api/info") == 0) {
                snprintf(response, sizeof(response),
                        "{\"name\":\"Notification Client\",\"version\":\"2.0.0\",\"arch\":\"mips64el\",\"async\":true}");
            } else {
                status = 404;
                snprintf(response, sizeof(response), "{\"error\":\"Endpoint not found\"}");
            }
            
            char full_response[4096];
            snprintf(full_response, sizeof(full_response),
                    "HTTP/1.1 %d OK\r\n"
                    "Content-Type: application/json\r\n"
                    "Content-Length: %zu\r\n"
                    "Connection: close\r\n"
                    "\r\n%s",
                    status, strlen(response), response);
            
            write_all(client_fd, full_response, strlen(full_response), 5000);
            close(client_fd);
        }
        
        static void* worker_thread(void *arg) {
            http_server_opt_t *server = (http_server_opt_t*)arg;
            while (server->running) {
                int fd = dequeue_task();
                if (fd < 0) continue;
                
                char buffer[BUFFER_SIZE] = {0};
                size_t len = 0;
                if (read_all(fd, buffer, &len, sizeof(buffer) - 1, READ_TIMEOUT_MS) == 0) {
                    handle_request(fd, buffer, len);
                } else {
                    close(fd);
                }
            }
            return NULL;
        }
        
        http_server_opt_t* http_server_opt_create(int port, int max_workers, int max_connections) {
            if (max_workers <= 0) max_workers = 4;
            if (max_connections <= 0) max_connections = 100;
            
            http_server_opt_t *server = calloc(1, sizeof(http_server_opt_t));
            if (!server) return NULL;
            
            server->port = port;
            server->max_connections = max_connections;
            server->worker_count = max_workers;
            server->running = 0;
            server->current_connections = 0;
            pthread_mutex_init(&server->conn_mutex, NULL);
            
            server->server_fd = socket(AF_INET, SOCK_STREAM | SOCK_NONBLOCK, 0);
            if (server->server_fd < 0) {
                free(server);
                return NULL;
            }
            
            int opt = 1;
            setsockopt(server->server_fd, SOL_SOCKET, SO_REUSEADDR, &opt, sizeof(opt));
            setsockopt(server->server_fd, IPPROTO_TCP, TCP_NODELAY, &opt, sizeof(opt));
            
            struct sockaddr_in addr;
            memset(&addr, 0, sizeof(addr));
            addr.sin_family = AF_INET;
            addr.sin_addr.s_addr = INADDR_ANY;
            addr.sin_port = htons(port);
            
            if (bind(server->server_fd, (struct sockaddr*)&addr, sizeof(addr)) < 0) {
                close(server->server_fd);
                free(server);
                return NULL;
            }
            
            if (listen(server->server_fd, max_connections) < 0) {
                close(server->server_fd);
                free(server);
                return NULL;
            }
            
            audio_worker_init(2);
            
            server->worker_threads = malloc(sizeof(pthread_t) * max_workers);
            for (int i = 0; i < max_workers; i++) {
                pthread_create(&server->worker_threads[i], NULL, worker_thread, server);
            }
            
            syslog(LOG_INFO, "HTTP server created on port %d with %d workers", port, max_workers);
            return server;
        }
        
        void http_server_opt_destroy(http_server_opt_t *server) {
            if (!server) return;
            server->running = 0;
            for (int i = 0; i < server->worker_count; i++) {
                pthread_join(server->worker_threads[i], NULL);
            }
            close(server->server_fd);
            pthread_mutex_destroy(&server->conn_mutex);
            free(server->worker_threads);
            free(server);
            audio_worker_cleanup();
            syslog(LOG_INFO, "HTTP server destroyed");
        }
        
        void http_server_opt_run(http_server_opt_t *server) {
            if (!server) return;
            server->running = 1;
            
            struct epoll_event ev, events[MAX_EVENTS];
            int epoll_fd = epoll_create1(0);
            ev.events = EPOLLIN;
            ev.data.fd = server->server_fd;
            epoll_ctl(epoll_fd, EPOLL_CTL_ADD, server->server_fd, &ev);
            
            syslog(LOG_INFO, "HTTP server running on port %d", server->port);
            
            while (server->running) {
                int nfds = epoll_wait(epoll_fd, events, MAX_EVENTS, 100);
                for (int i = 0; i < nfds; i++) {
                    if (events[i].data.fd == server->server_fd) {
                        struct sockaddr_in client_addr;
                        socklen_t addr_len = sizeof(client_addr);
                        int client_fd = accept4(server->server_fd, 
                                                (struct sockaddr*)&client_addr, 
                                                &addr_len, SOCK_NONBLOCK);
                        if (client_fd < 0) continue;
                        
                        pthread_mutex_lock(&server->conn_mutex);
                        if (server->current_connections < server->max_connections) {
                            server->current_connections++;
                            enqueue_task(client_fd);
                        } else {
                            close(client_fd);
                        }
                        pthread_mutex_unlock(&server->conn_mutex);
                    }
                }
            }
            close(epoll_fd);
            syslog(LOG_INFO, "HTTP server stopped");
        }
        
        void http_server_opt_stop(http_server_opt_t *server) {
            if (server) server->running = 0;
        }
        HTTP_OPT_C_EOF
        
        # ============================================
        # main_optimized.c
        # ============================================
        cat > src/main_optimized.c << 'MAIN_OPT_EOF'
        #include <stdio.h>
        #include <stdlib.h>
        #include <string.h>
        #include <unistd.h>
        #include <signal.h>
        #include <syslog.h>
        #include <getopt.h>
        #include <sys/stat.h>
        #include "http_server_optimized.h"
        #include "audio_worker.h"
        
        #define VERSION "2.0.0"
        
        static int running = 1;
        
        void signal_handler(int sig) {
            if (sig == SIGINT || sig == SIGTERM) {
                syslog(LOG_INFO, "Received termination signal, shutting down...");
                running = 0;
            }
        }
        
        void daemonize(void) {
            pid_t pid = fork();
            if (pid < 0) { perror("fork"); exit(1); }
            if (pid > 0) { exit(0); }
            umask(0);
            if (setsid() < 0) { perror("setsid"); exit(1); }
            close(STDIN_FILENO);
            close(STDOUT_FILENO);
            close(STDERR_FILENO);
            openlog("notification-client", LOG_PID, LOG_DAEMON);
        }
        
        void print_usage(char *prog) {
            printf("Usage: %s [OPTIONS]\n", prog);
            printf("Options:\n");
            printf("  -c, --config FILE   Configuration file path\n");
            printf("  -d, --daemon        Run as daemon\n");
            printf("  -p, --port PORT     HTTP server port (default: 8080)\n");
            printf("  -w, --workers N     Number of worker threads (default: 4)\n");
            printf("  -h, --help          Show this help message\n");
            printf("  -v, --version       Show version information\n");
        }
        
        int main(int argc, char *argv[]) {
            int http_port = 8080;
            int daemon_mode = 0;
            int num_workers = 4;
            int max_connections = 100;
            
            static struct option long_options[] = {
                {"config", required_argument, 0, 'c'},
                {"daemon", no_argument, 0, 'd'},
                {"port", required_argument, 0, 'p'},
                {"workers", required_argument, 0, 'w'},
                {"help", no_argument, 0, 'h'},
                {"version", no_argument, 0, 'v'},
                {0, 0, 0, 0}
            };
            
            int opt;
            while ((opt = getopt_long(argc, argv, "c:dp:w:hv", long_options, NULL)) != -1) {
                switch (opt) {
                    case 'c': break;
                    case 'd': daemon_mode = 1; break;
                    case 'p': http_port = atoi(optarg); break;
                    case 'w': num_workers = atoi(optarg); break;
                    case 'h': print_usage(argv[0]); return 0;
                    case 'v': printf("Notification Client v%s\n", VERSION); return 0;
                    default: print_usage(argv[0]); return 1;
                }
            }
            
            if (daemon_mode) daemonize();
            
            signal(SIGINT, signal_handler);
            signal(SIGTERM, signal_handler);
            signal(SIGHUP, signal_handler);
            
            http_server_opt_t *server = http_server_opt_create(http_port, num_workers, max_connections);
            if (!server) {
                syslog(LOG_ERR, "Failed to create HTTP server");
                return 1;
            }
            
            syslog(LOG_INFO, "Notification Client v%s started (optimized version)", VERSION);
            http_server_opt_run(server);
            http_server_opt_destroy(server);
            syslog(LOG_INFO, "Notification client stopped");
            closelog();
            return 0;
        }
        MAIN_OPT_EOF
        
        echo "=== 所有源文件创建完成 ==="
        ls -la src/
        
    - name: Setup cross-compilation environment
      run: |
        echo "CC=mips64el-linux-gnuabi64-gcc" >> $GITHUB_ENV
        echo "CXX=mips64el-linux-gnuabi64-g++" >> $GITHUB_ENV
        echo "AR=mips64el-linux-gnuabi64-ar" >> $GITHUB_ENV
        echo "STRIP=mips64el-linux-gnuabi64-strip" >> $GITHUB_ENV
        
    - name: Clean up and create Makefile
      run: |
        rm -rf makefile Makefile Makefile.*
        rm -rf notification-client
        rm -rf package/
        rm -f notification-client_*.deb
        rm -f src/*.o
        
        cat > Makefile << 'MAKEFILE_EOF'
        CC = mips64el-linux-gnuabi64-gcc
        CXX = mips64el-linux-gnuabi64-g++
        AR = mips64el-linux-gnuabi64-ar
        STRIP = mips64el-linux-gnuabi64-strip
        
        MARCH = mips64r2
        CFLAGS = -Wall -O2 -march=$(MARCH) -D_GNU_SOURCE -pthread
        LDFLAGS = -lpthread
        
        SOURCES = src/main_optimized.c src/audio_worker.c src/http_server_optimized.c
        OBJECTS = $(SOURCES:.c=.o)
        TARGET = notification-client
        
        all: $(TARGET)
        
        $(TARGET): $(OBJECTS)
        	$(CC) $(CFLAGS) -o $@ $^ $(LDFLAGS)
        	@echo "Build complete: $@"
        	@file $@
        
        %.o: %.c
        	$(CC) $(CFLAGS) -c $< -o $@
        
        clean:
        	rm -f $(OBJECTS)
        	rm -rf $(TARGET)
        	rm -f notification-client_*.deb
        	rm -rf package/
        MAKEFILE_EOF
        
        echo "=== Makefile created ==="
        cat Makefile
        
    - name: Build binary
      run: |
        make clean
        make
        file notification-client
        
    - name: Create DEB package structure
      run: |
        mkdir -p package/DEBIAN
        mkdir -p package/usr/bin
        mkdir -p package/etc/notification-client
        mkdir -p package/usr/share/notification-client/sounds
        mkdir -p package/lib/systemd/system
        
        cp notification-client package/usr/bin/
        ${STRIP} package/usr/bin/notification-client 2>/dev/null || true
        
        cat > package/etc/notification-client/config.json << 'EOF'
        {
          "default_sound": "/usr/share/notification-client/sounds/default.wav",
          "default_volume": 80,
          "http_port": 8080,
          "audio_device": "default",
          "enable_wakeup": true,
          "custom_sounds": []
        }
        EOF
        
        if command -v sox > /dev/null; then
          sox -n package/usr/share/notification-client/sounds/default.wav synth 0.5 sine 800 2>/dev/null || true
        fi
        
        cat > package/lib/systemd/system/notification-client.service << 'SERVICE_EOF'
        [Unit]
        Description=Notification Client Service (Optimized)
        After=network.target sound.target
        Wants=network.target

        [Service]
        Type=simple
        User=nobody
        Group=nogroup
        ExecStart=/usr/bin/notification-client -d -p 8080 -w 4
        Restart=always
        RestartSec=10
        StandardOutput=syslog
        StandardError=syslog
        SyslogIdentifier=notification-client

        [Install]
        WantedBy=multi-user.target
        SERVICE_EOF
        
    - name: Create DEBIAN control files
      run: |
        VERSION="2.0.0"
        if [ -n "${{ github.ref_type }}" ] && [ "${{ github.ref_type }}" = "tag" ]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        fi
        
        cat > package/DEBIAN/control << CONTROL_EOF
        Package: notification-client
        Version: ${VERSION}
        Section: sound
        Priority: optional
        Architecture: mips64el
        Maintainer: ${GITHUB_ACTOR} <${GITHUB_ACTOR}@users.noreply.github.com>
        Depends: libc6 (>= 2.28), systemd
        Suggests: sox, alsa-utils, pulseaudio
        Description: Notification audio playback client with HTTP API
         Optimized version with async playback and thread pool.
        Homepage: https://github.com/${GITHUB_REPOSITORY}
        CONTROL_EOF
        
        cat > package/DEBIAN/postinst << 'POSTINST_EOF'
        #!/bin/bash
        set -e
        case "$1" in
            configure)
                mkdir -p /etc/notification-client
                mkdir -p /usr/share/notification-client/sounds
                if [ ! -f /usr/share/notification-client/sounds/default.wav ] && command -v sox > /dev/null; then
                    sox -n /usr/share/notification-client/sounds/default.wav synth 0.5 sine 800 2>/dev/null || true
                fi
                systemctl daemon-reload 2>/dev/null || true
                systemctl enable notification-client.service 2>/dev/null || true
                systemctl start notification-client.service 2>/dev/null || true
                ;;
        esac
        exit 0
        POSTINST_EOF
        chmod 755 package/DEBIAN/postinst
        
        cat > package/DEBIAN/prerm << 'PRERM_EOF'
        #!/bin/bash
        set -e
        case "$1" in
            remove)
                systemctl stop notification-client.service 2>/dev/null || true
                systemctl disable notification-client.service 2>/dev/null || true
                ;;
        esac
        exit 0
        PRERM_EOF
        chmod 755 package/DEBIAN/prerm
        
    - name: Build DEB package
      run: |
        VERSION="2.0.0"
        if [ -n "${{ github.ref_type }}" ] && [ "${{ github.ref_type }}" = "tag" ]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        fi
        fakeroot dpkg-deb --build package notification-client_${VERSION}_mips64el.deb
        file notification-client_${VERSION}_mips64el.deb
        dpkg-deb --info notification-client_${VERSION}_mips64el.deb
        
    - name: Upload DEB artifact
      uses: actions/upload-artifact@v4
      with:
        name: notification-client-mips64el
        path: notification-client_*.deb
        if-no-files-found: error
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: notification-client_*.deb
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
