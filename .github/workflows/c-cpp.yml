name: Build MIPS64el Notification Client with HTTPS (Multi-Source)

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Configure multi-source repositories
      run: |
        # 1. 配置麒麟源
        sudo tee /etc/apt/sources.list.d/kylin.list << 'EOF'
        deb https://update.cs2c.com.cn/NS/V10/V10SP1.1/os/adv/lic/updates/ ./
        deb https://update.cs2c.com.cn/NS/V10/V10SP1.1/os/adv/lic/updates/ updates/
        EOF
        
        # 2. 配置Ubuntu ports源（用于MIPS64el架构包）
        sudo tee /etc/apt/sources.list.d/ubuntu-ports.list << 'EOF'
        deb [arch=mips64el] http://ports.ubuntu.com/ubuntu-ports jammy main universe
        deb [arch=mips64el] http://ports.ubuntu.com/ubuntu-ports jammy-updates main universe
        deb [arch=mips64el] http://ports.ubuntu.com/ubuntu-ports jammy-security main universe
        EOF
        
        # 3. 配置Debian ports源（备用）
        sudo tee /etc/apt/sources.list.d/debian-ports.list << 'EOF'
        deb [arch=mips64el] http://deb.debian.org/debian-ports sid main
        deb [arch=mips64el] http://deb.debian.org/debian-ports unreleased main
        EOF
        
        # 4. 添加MIPS64el架构支持
        sudo dpkg --add-architecture mips64el
        
        # 5. 更新包列表（忽略部分源不可达的错误）
        sudo apt-get update || true
        
        echo "=== 源配置完成 ==="
        cat /etc/apt/sources.list.d/*.list
        
    - name: Install cross-compilation toolchain
      run: |
        # 安装交叉编译工具链（从Ubuntu主仓库）
        sudo apt-get install -y \
          gcc-12-mips64el-linux-gnuabi64 \
          g++-12-mips64el-linux-gnuabi64 \
          binutils-mips64el-linux-gnuabi64 \
          dpkg-dev \
          debhelper \
          fakeroot \
          file \
          lintian \
          sox \
          libsox-dev \
          pkg-config \
          wget \
          curl \
          openssl \
          libssl-dev || true
        
        # 创建软链接
        sudo ln -sf /usr/bin/mips64el-linux-gnuabi64-gcc-12 /usr/bin/mips64el-linux-gnuabi64-gcc 2>/dev/null || true
        sudo ln -sf /usr/bin/mips64el-linux-gnuabi64-g++-12 /usr/bin/mips64el-linux-gnuabi64-g++ 2>/dev/null || true
        
        # 如果gcc-12不存在，尝试gcc-11
        if ! command -v mips64el-linux-gnuabi64-gcc &> /dev/null; then
          sudo apt-get install -y gcc-11-mips64el-linux-gnuabi64 g++-11-mips64el-linux-gnuabi64 || true
          sudo ln -sf /usr/bin/mips64el-linux-gnuabi64-gcc-11 /usr/bin/mips64el-linux-gnuabi64-gcc 2>/dev/null || true
          sudo ln -sf /usr/bin/mips64el-linux-gnuabi64-g++-11 /usr/bin/mips64el-linux-gnuabi64-g++ 2>/dev/null || true
        fi
        
        # 验证
        echo "=== 验证交叉编译工具链 ==="
        which mips64el-linux-gnuabi64-gcc || echo "gcc not found"
        mips64el-linux-gnuabi64-gcc --version 2>/dev/null || echo "gcc version check failed"
        
    - name: Install MIPS64el dependencies from all sources
      run: |
        echo "=== 从多源安装MIPS64el依赖 ==="
        
        # 创建依赖目录
        mkdir -p deps/mips64el/usr/lib/notification-client
        mkdir -p deps/mips64el/usr/lib/notification-client/bin
        mkdir -p deps/mips64el/usr/include
        
        # 尝试从不同源安装OpenSSL
        echo "尝试安装OpenSSL (MIPS64el)..."
        
        # 尝试从Ubuntu ports安装
        sudo apt-get install -y \
          libssl-dev:mips64el \
          libssl3:mips64el \
          libc6-dev:mips64el \
          libpulse-dev:mips64el \
          libasound2-dev:mips64el \
          libjson-c-dev:mips64el 2>/dev/null || true
        
        # 如果失败，从Debian ports安装
        sudo apt-get install -y \
          libssl-dev:mips64el \
          libssl3:mips64el \
          libc6-dev:mips64el 2>/dev/null || true
        
        # 复制已安装的库
        echo "=== 复制MIPS64el库 ==="
        PATHS="/usr/lib/mips64el-linux-gnuabi64 /usr/mips64el-linux-gnuabi64/lib"
        for path in $PATHS; do
          if [ -d "$path" ]; then
            echo "Checking: $path"
            find "$path" -name "*.so*" -type f 2>/dev/null | while read lib; do
              echo "Copying: $lib"
              cp -v "$lib" deps/mips64el/usr/lib/notification-client/ 2>/dev/null || true
            done
          fi
        done
        
        # 复制头文件
        HEADER_PATHS="/usr/include/mips64el-linux-gnuabi64 /usr/mips64el-linux-gnuabi64/include"
        for path in $HEADER_PATHS; do
          if [ -d "$path" ]; then
            echo "Copying headers from: $path"
            cp -r "$path"/* deps/mips64el/usr/include/ 2>/dev/null || true
          fi
        done
        
        # 从Ubuntu ports直接下载OpenSSL deb包（备用方案）
        echo "=== 从Ubuntu ports下载OpenSSL deb包 ==="
        cd /tmp
        wget -q http://ports.ubuntu.com/ubuntu-ports/pool/main/o/openssl/libssl3_3.0.2-0ubuntu1_mips64el.deb -O libssl3.deb 2>/dev/null || true
        if [ -f libssl3.deb ]; then
          dpkg -x libssl3.deb temp_ssl/ 2>/dev/null || true
          if [ -d temp_ssl/usr/lib/mips64el-linux-gnuabi64 ]; then
            cp -r temp_ssl/usr/lib/mips64el-linux-gnuabi64/* $OLDPWD/deps/mips64el/usr/lib/notification-client/ 2>/dev/null || true
          fi
          rm -rf temp_ssl libssl3.deb
        fi
        
        wget -q http://ports.ubuntu.com/ubuntu-ports/pool/main/o/openssl/libssl-dev_3.0.2-0ubuntu1_mips64el.deb -O libssl-dev.deb 2>/dev/null || true
        if [ -f libssl-dev.deb ]; then
          dpkg -x libssl-dev.deb temp_ssl_dev/ 2>/dev/null || true
          if [ -d temp_ssl_dev/usr/include/mips64el-linux-gnuabi64/openssl ]; then
            mkdir -p $OLDPWD/deps/mips64el/usr/include
            cp -r temp_ssl_dev/usr/include/mips64el-linux-gnuabi64/openssl $OLDPWD/deps/mips64el/usr/include/ 2>/dev/null || true
          fi
          rm -rf temp_ssl_dev libssl-dev.deb
        fi
        cd $OLDPWD
        
        echo "=== 依赖下载完成 ==="
        echo "库文件数量: $(ls -1 deps/mips64el/usr/lib/notification-client/*.so* 2>/dev/null | wc -l)"
        echo "头文件: $(ls -1 deps/mips64el/usr/include/ 2>/dev/null | head -10)"
        
    - name: Download and extract audio tools
      run: |
        echo "=== 下载音频工具 ==="
        mkdir -p deps/mips64el/usr/lib/notification-client/bin
        
        cd /tmp
        # 从Ubuntu ports下载alsa-utils
        wget -q http://ports.ubuntu.com/ubuntu-ports/pool/main/a/alsa-utils/alsa-utils_1.2.6-1ubuntu1_mips64el.deb -O alsa-utils.deb 2>/dev/null || true
        if [ -f alsa-utils.deb ]; then
          dpkg -x alsa-utils.deb temp_alsa/ 2>/dev/null || true
          if [ -f temp_alsa/usr/bin/aplay ]; then
            cp temp_alsa/usr/bin/aplay $OLDPWD/deps/mips64el/usr/lib/notification-client/bin/
            echo "aplay extracted"
          fi
          rm -rf temp_alsa alsa-utils.deb
        fi
        
        # 从Ubuntu ports下载pulseaudio-utils
        wget -q http://ports.ubuntu.com/ubuntu-ports/pool/main/p/pulseaudio/pulseaudio-utils_13.99.1-1ubuntu3_mips64el.deb -O pulseaudio-utils.deb 2>/dev/null || true
        if [ -f pulseaudio-utils.deb ]; then
          dpkg -x pulseaudio-utils.deb temp_pulse/ 2>/dev/null || true
          if [ -f temp_pulse/usr/bin/paplay ]; then
            cp temp_pulse/usr/bin/paplay $OLDPWD/deps/mips64el/usr/lib/notification-client/bin/
            echo "paplay extracted"
          fi
          rm -rf temp_pulse pulseaudio-utils.deb
        fi
        cd $OLDPWD
        
        # 备用：使用系统工具（非MIPS64el，仅作为fallback）
        if [ ! -f deps/mips64el/usr/lib/notification-client/bin/aplay ]; then
          echo "aplay not downloaded, trying system aplay..."
          if [ -f /usr/bin/aplay ]; then
            cp /usr/bin/aplay deps/mips64el/usr/lib/notification-client/bin/
            echo "aplay copied from system"
          fi
        fi
        
        if [ ! -f deps/mips64el/usr/lib/notification-client/bin/paplay ]; then
          echo "paplay not downloaded, trying system paplay..."
          if [ -f /usr/bin/paplay ]; then
            cp /usr/bin/paplay deps/mips64el/usr/lib/notification-client/bin/
            echo "paplay copied from system"
          fi
        fi
        
        chmod 755 deps/mips64el/usr/lib/notification-client/bin/* 2>/dev/null || true
        
        # 复制其他工具
        for tool in amixer pactl systemd-inhibit openssl; do
          if [ -f "/usr/bin/$tool" ]; then
            cp "/usr/bin/$tool" deps/mips64el/usr/lib/notification-client/bin/ 2>/dev/null || true
            echo "$tool copied"
          fi
        done
        
        echo "=== 音频工具完成 ==="
        ls -la deps/mips64el/usr/lib/notification-client/bin/
        
    - name: Generate SSL certificate
      run: |
        echo "=== 生成SSL证书 ==="
        mkdir -p certs
        openssl req -x509 -newkey rsa:2048 -nodes \
          -keyout certs/server.key \
          -out certs/server.crt \
          -days 3650 \
          -subj "/C=CN/ST=Beijing/L=Beijing/O=Kylin/CN=notification-server"
        chmod 600 certs/server.key
        chmod 644 certs/server.crt
        echo "证书生成完成"
        ls -la certs/
        
    - name: Create source files
      run: |
        mkdir -p src
        
        # ============================================
        # notification_client.h
        # ============================================
        cat > src/notification_client.h << 'HEADER_EOF'
        #ifndef NOTIFICATION_CLIENT_H
        #define NOTIFICATION_CLIENT_H
        
        #include <stdint.h>
        #include <pthread.h>
        
        #define VERSION "3.0.0"
        
        typedef enum {
            CMD_PLAY,
            CMD_STOP,
            CMD_SET_VOLUME,
            CMD_GET_VOLUME,
            CMD_CHECK_DEVICE
        } audio_cmd_type_t;
        
        typedef struct {
            audio_cmd_type_t type;
            char sound_file[256];
            int force_wakeup;
            int volume;
            int result;
            int completed;
            pthread_cond_t cond;
            pthread_mutex_t mutex;
        } audio_job_t;
        
        int audio_worker_init(int num_workers);
        void audio_worker_cleanup(void);
        int audio_play_async(const char *filename, int force_wakeup);
        void audio_stop_async(void);
        void audio_set_volume_async(int volume);
        int audio_get_volume_sync(void);
        int audio_check_device_sync(void);
        
        typedef struct server_s server_t;
        server_t* server_create(int port, int max_workers, int max_connections,
                                const char *cert_file, const char *key_file);
        void server_destroy(server_t *server);
        void server_run(server_t *server);
        void server_stop(server_t *server);
        
        #endif
        HEADER_EOF
        
        # ============================================
        # audio_worker.c
        # ============================================
        cat > src/audio_worker.c << 'AUDIO_EOF'
        #include "notification_client.h"
        #include <stdio.h>
        #include <stdlib.h>
        #include <string.h>
        #include <unistd.h>
        #include <syslog.h>
        #include <errno.h>
        #include <sys/wait.h>
        #include <signal.h>
        
        #define MAX_QUEUE 100
        #define MAX_WORKERS 4
        #define PLAYER_PATH "/usr/lib/notification-client/bin"
        
        typedef struct {
            audio_job_t *jobs[MAX_QUEUE];
            int head, tail, count;
            pthread_mutex_t mutex;
            pthread_cond_t not_empty, not_full;
        } queue_t;
        
        static queue_t queue;
        static pthread_t workers[MAX_WORKERS];
        static int worker_count = 0;
        static int initialized = 0;
        static int volume = 80;
        static pthread_mutex_t vol_mutex = PTHREAD_MUTEX_INITIALIZER;
        static int has_aplay = 0, has_paplay = 0;
        
        static void detect_players(void) {
            char path[256];
            snprintf(path, sizeof(path), "%s/aplay", PLAYER_PATH);
            has_aplay = (access(path, X_OK) == 0) || (access("/usr/bin/aplay", X_OK) == 0);
            snprintf(path, sizeof(path), "%s/paplay", PLAYER_PATH);
            has_paplay = (access(path, X_OK) == 0) || (access("/usr/bin/paplay", X_OK) == 0);
            syslog(LOG_INFO, "Players: aplay=%d, paplay=%d", has_aplay, has_paplay);
        }
        
        static int play_audio(const char *filename, int force_wakeup) {
            char player[256] = {0};
            
            if (has_aplay) {
                snprintf(player, sizeof(player), "%s/aplay", PLAYER_PATH);
                if (access(player, X_OK) != 0) snprintf(player, sizeof(player), "/usr/bin/aplay");
            } else if (has_paplay) {
                snprintf(player, sizeof(player), "%s/paplay", PLAYER_PATH);
                if (access(player, X_OK) != 0) snprintf(player, sizeof(player), "/usr/bin/paplay");
            } else {
                syslog(LOG_ERR, "No audio player");
                return -1;
            }
            
            pid_t pid = fork();
            if (pid == 0) {
                char lib_path[512];
                snprintf(lib_path, sizeof(lib_path), 
                        "LD_LIBRARY_PATH=/usr/lib/notification-client:/usr/lib/mips64el-linux-gnuabi64:$LD_LIBRARY_PATH");
                putenv(lib_path);
                if (force_wakeup) {
                    execlp("systemd-inhibit", "systemd-inhibit", 
                           "--why=Notification", "--mode=block", player, filename, NULL);
                }
                execl(player, player, filename, NULL);
                exit(1);
            } else if (pid > 0) {
                int status, timeout = 30;
                while (timeout > 0) {
                    if (waitpid(pid, &status, WNOHANG) > 0) {
                        return WIFEXITED(status) && WEXITSTATUS(status) == 0 ? 0 : -1;
                    }
                    sleep(1);
                    timeout--;
                }
                kill(pid, SIGTERM);
                waitpid(pid, NULL, 0);
                return -1;
            }
            return -1;
        }
        
        static void* worker_thread(void *arg) {
            (void)arg;
            detect_players();
            while (1) {
                pthread_mutex_lock(&queue.mutex);
                while (queue.count == 0) pthread_cond_wait(&queue.not_empty, &queue.mutex);
                audio_job_t *job = queue.jobs[queue.head];
                queue.head = (queue.head + 1) % MAX_QUEUE;
                queue.count--;
                pthread_cond_signal(&queue.not_full);
                pthread_mutex_unlock(&queue.mutex);
                
                if (job) {
                    switch (job->type) {
                        case CMD_PLAY:
                            job->result = play_audio(job->sound_file, job->force_wakeup);
                            break;
                        case CMD_SET_VOLUME:
                            pthread_mutex_lock(&vol_mutex);
                            volume = job->volume;
                            pthread_mutex_unlock(&vol_mutex);
                            {
                                char cmd[128];
                                snprintf(cmd, sizeof(cmd), 
                                        "amixer set Master %d%% 2>/dev/null || pactl set-sink-volume @DEFAULT_SINK@ %d%% 2>/dev/null",
                                        job->volume, job->volume);
                                if (system(cmd) != 0) {
                                    // 忽略错误
                                }
                            }
                            job->result = 0;
                            break;
                        default:
                            job->result = -1;
                            break;
                    }
                    pthread_mutex_lock(&job->mutex);
                    job->completed = 1;
                    pthread_cond_signal(&job->cond);
                    pthread_mutex_unlock(&job->mutex);
                }
            }
            return NULL;
        }
        
        int audio_worker_init(int num) {
            if (initialized) return 0;
            if (num <= 0 || num > MAX_WORKERS) num = MAX_WORKERS;
            queue.head = queue.tail = queue.count = 0;
            pthread_mutex_init(&queue.mutex, NULL);
            pthread_cond_init(&queue.not_empty, NULL);
            pthread_cond_init(&queue.not_full, NULL);
            worker_count = num;
            for (int i = 0; i < worker_count; i++) {
                pthread_create(&workers[i], NULL, worker_thread, NULL);
            }
            initialized = 1;
            syslog(LOG_INFO, "Audio worker: %d threads", worker_count);
            return 0;
        }
        
        void audio_worker_cleanup(void) {
            if (!initialized) return;
            initialized = 0;
            for (int i = 0; i < worker_count; i++) {
                pthread_cancel(workers[i]);
                pthread_join(workers[i], NULL);
            }
            pthread_mutex_destroy(&queue.mutex);
            pthread_cond_destroy(&queue.not_empty);
            pthread_cond_destroy(&queue.not_full);
            syslog(LOG_INFO, "Audio worker cleaned");
        }
        
        static int enqueue(audio_job_t *job) {
            if (!initialized) return -1;
            pthread_mutex_lock(&queue.mutex);
            while (queue.count >= MAX_QUEUE) pthread_cond_wait(&queue.not_full, &queue.mutex);
            queue.jobs[queue.tail] = job;
            queue.tail = (queue.tail + 1) % MAX_QUEUE;
            queue.count++;
            pthread_cond_signal(&queue.not_empty);
            pthread_mutex_unlock(&queue.mutex);
            return 0;
        }
        
        int audio_play_async(const char *filename, int force_wakeup) {
            audio_job_t *job = malloc(sizeof(audio_job_t));
            if (!job) return -1;
            memset(job, 0, sizeof(audio_job_t));
            job->type = CMD_PLAY;
            strncpy(job->sound_file, filename, 255);
            job->sound_file[255] = '\0';
            job->force_wakeup = force_wakeup;
            job->completed = 1;
            return enqueue(job);
        }
        
        void audio_stop_async(void) {
            if (system("pkill -f aplay 2>/dev/null") != 0) {
                // 忽略错误
            }
            if (system("pkill -f paplay 2>/dev/null") != 0) {
                // 忽略错误
            }
        }
        
        void audio_set_volume_async(int vol) {
            if (vol < 0) vol = 0;
            if (vol > 100) vol = 100;
            audio_job_t *job = malloc(sizeof(audio_job_t));
            if (!job) return;
            memset(job, 0, sizeof(audio_job_t));
            job->type = CMD_SET_VOLUME;
            job->volume = vol;
            job->completed = 1;
            enqueue(job);
        }
        
        int audio_get_volume_sync(void) {
            pthread_mutex_lock(&vol_mutex);
            int v = volume;
            pthread_mutex_unlock(&vol_mutex);
            return v;
        }
        
        int audio_check_device_sync(void) {
            return (system("aplay -l 2>/dev/null | grep -q card") == 0) ||
                   (system("pactl info > /dev/null 2>&1") == 0);
        }
        AUDIO_EOF
        
        # ============================================
        # server.c - 支持HTTPS
        # ============================================
        cat > src/server.c << 'SERVER_EOF'
        #include "notification_client.h"
        #include <stdio.h>
        #include <stdlib.h>
        #include <string.h>
        #include <unistd.h>
        #include <sys/socket.h>
        #include <sys/epoll.h>
        #include <netinet/in.h>
        #include <netinet/tcp.h>
        #include <arpa/inet.h>
        #include <pthread.h>
        #include <syslog.h>
        #include <errno.h>
        #include <fcntl.h>
        #include <poll.h>
        #include <openssl/ssl.h>
        #include <openssl/err.h>
        
        #define MAX_EVENTS 64
        #define BUFFER_SIZE 8192
        #define READ_TIMEOUT 5000
        
        struct server_s {
            int http_fd;
            int https_fd;
            int http_port;
            int https_port;
            int running;
            int max_conn;
            int current_conn;
            pthread_t *workers;
            int worker_count;
            pthread_mutex_t conn_mutex;
            SSL_CTX *ssl_ctx;
            char cert_file[256];
            char key_file[256];
            int has_ssl;
        };
        
        typedef struct {
            int fd;
            SSL *ssl;
            int is_https;
            struct sockaddr_in addr;
        } client_t;
        
        typedef struct task_s {
            client_t client;
            struct task_s *next;
        } task_t;
        
        static task_t *task_head = NULL, *task_tail = NULL;
        static pthread_mutex_t task_mutex = PTHREAD_MUTEX_INITIALIZER;
        static pthread_cond_t task_cond = PTHREAD_COND_INITIALIZER;
        
        static SSL_CTX* init_ssl(const char *cert, const char *key) {
            SSL_library_init();
            OpenSSL_add_all_algorithms();
            SSL_load_error_strings();
            SSL_CTX *ctx = SSL_CTX_new(TLS_server_method());
            if (!ctx) { syslog(LOG_ERR, "SSL_CTX_new failed"); return NULL; }
            SSL_CTX_set_min_proto_version(ctx, TLS1_2_VERSION);
            if (SSL_CTX_use_certificate_file(ctx, cert, SSL_FILETYPE_PEM) <= 0) {
                syslog(LOG_ERR, "Certificate load failed: %s", cert);
                SSL_CTX_free(ctx); return NULL;
            }
            if (SSL_CTX_use_PrivateKey_file(ctx, key, SSL_FILETYPE_PEM) <= 0) {
                syslog(LOG_ERR, "Private key load failed: %s", key);
                SSL_CTX_free(ctx); return NULL;
            }
            if (!SSL_CTX_check_private_key(ctx)) {
                syslog(LOG_ERR, "Key/cert mismatch");
                SSL_CTX_free(ctx); return NULL;
            }
            syslog(LOG_INFO, "SSL initialized");
            return ctx;
        }
        
        static void enqueue_task(client_t *client) {
            task_t *task = malloc(sizeof(task_t));
            if (!task) {
                if (client->ssl) SSL_free(client->ssl);
                close(client->fd);
                return;
            }
            task->client = *client;
            task->next = NULL;
            pthread_mutex_lock(&task_mutex);
            if (task_tail) task_tail->next = task;
            else task_head = task;
            task_tail = task;
            pthread_cond_signal(&task_cond);
            pthread_mutex_unlock(&task_mutex);
        }
        
        static int dequeue_task(client_t *client) {
            pthread_mutex_lock(&task_mutex);
            while (!task_head) pthread_cond_wait(&task_cond, &task_mutex);
            task_t *task = task_head;
            task_head = task->next;
            if (!task_head) task_tail = NULL;
            *client = task->client;
            free(task);
            pthread_mutex_unlock(&task_mutex);
            return 0;
        }
        
        static int read_all(int fd, SSL *ssl, int is_https, char *buf, size_t *len, size_t max_len) {
            struct pollfd pfd = {.fd = fd, .events = POLLIN};
            size_t total = 0;
            int ret;
            
            while (total < max_len) {
                if (poll(&pfd, 1, READ_TIMEOUT) <= 0) return -1;
                
                if (is_https && ssl) {
                    ret = SSL_read(ssl, buf + total, max_len - total);
                    if (ret <= 0) {
                        int err = SSL_get_error(ssl, ret);
                        if (err == SSL_ERROR_WANT_READ || err == SSL_ERROR_WANT_WRITE) continue;
                        return -1;
                    }
                } else {
                    ret = read(fd, buf + total, max_len - total);
                    if (ret <= 0) return -1;
                }
                total += ret;
                if (total >= 4 && strstr(buf, "\r\n\r\n")) break;
            }
            *len = total;
            return 0;
        }
        
        static int write_all(int fd, SSL *ssl, int is_https, const char *buf, size_t len) {
            size_t sent = 0;
            struct pollfd pfd = {.fd = fd, .events = POLLOUT};
            int ret;
            
            while (sent < len) {
                if (poll(&pfd, 1, READ_TIMEOUT) <= 0) return -1;
                
                if (is_https && ssl) {
                    ret = SSL_write(ssl, buf + sent, len - sent);
                    if (ret <= 0) {
                        int err = SSL_get_error(ssl, ret);
                        if (err == SSL_ERROR_WANT_READ || err == SSL_ERROR_WANT_WRITE) continue;
                        return -1;
                    }
                } else {
                    ret = write(fd, buf + sent, len - sent);
                    if (ret <= 0) return -1;
                }
                sent += ret;
            }
            return 0;
        }
        
        static void handle_api(client_t *client, char *buf, size_t len) {
            (void)len;
            char method[16] = {0}, path[256] = {0};
            char response[4096] = {0};
            int status = 200;
            
            if (sscanf(buf, "%15s %255s", method, path) != 2) {
                if (client->ssl) SSL_free(client->ssl);
                close(client->fd);
                return;
            }
            
            char *body = strstr(buf, "\r\n\r\n");
            if (body) body += 4;
            
            if (strcmp(path, "/api/play") == 0) {
                int force = (body && strstr(body, "force_wakeup")) ? 1 : 0;
                int result = audio_play_async("/usr/share/notification-client/sounds/default.wav", force);
                snprintf(response, sizeof(response),
                        "{\"action\":\"play\",\"success\":%s,\"async\":true,\"protocol\":\"%s\"}",
                        result == 0 ? "true" : "false",
                        client->is_https ? "https" : "http");
                status = result == 0 ? 200 : 500;
            } else if (strcmp(path, "/api/stop") == 0) {
                audio_stop_async();
                snprintf(response, sizeof(response), "{\"action\":\"stop\",\"success\":true}");
            } else if (strcmp(path, "/api/volume") == 0) {
                if (body && strstr(body, "volume")) {
                    int vol = atoi(strstr(body, "volume") + 7);
                    audio_set_volume_async(vol);
                    snprintf(response, sizeof(response), "{\"volume\":%d,\"success\":true}", vol);
                } else {
                    snprintf(response, sizeof(response), "{\"volume\":%d}", audio_get_volume_sync());
                }
            } else if (strcmp(path, "/api/status") == 0) {
                snprintf(response, sizeof(response),
                        "{\"status\":\"running\",\"device\":%d,\"volume\":%d,\"https\":%d}",
                        audio_check_device_sync(), audio_get_volume_sync(), client->is_https);
            } else if (strcmp(path, "/api/info") == 0) {
                snprintf(response, sizeof(response),
                        "{\"name\":\"Notification Client\",\"version\":\"%s\",\"arch\":\"mips64el\",\"protocol\":\"%s\"}",
                        VERSION, client->is_https ? "https" : "http");
            } else {
                status = 404;
                snprintf(response, sizeof(response), "{\"error\":\"Not found\"}");
            }
            
            char full[8192];
            snprintf(full, sizeof(full),
                    "HTTP/1.1 %d OK\r\n"
                    "Content-Type: application/json\r\n"
                    "Content-Length: %zu\r\n"
                    "Connection: close\r\n"
                    "\r\n%s",
                    status, strlen(response), response);
            
            write_all(client->fd, client->ssl, client->is_https, full, strlen(full));
            if (client->ssl) SSL_free(client->ssl);
            close(client->fd);
        }
        
        static void* worker_thread(void *arg) {
            server_t *server = (server_t*)arg;
            while (server->running) {
                client_t client;
                dequeue_task(&client);
                if (client.fd < 0) continue;
                char buffer[BUFFER_SIZE] = {0};
                size_t len = 0;
                if (read_all(client.fd, client.ssl, client.is_https, buffer, &len, sizeof(buffer)-1) == 0) {
                    handle_api(&client, buffer, len);
                } else {
                    if (client.ssl) SSL_free(client.ssl);
                    close(client.fd);
                }
                pthread_mutex_lock(&server->conn_mutex);
                server->current_conn--;
                pthread_mutex_unlock(&server->conn_mutex);
            }
            return NULL;
        }
        
        static int create_socket(int port) {
            int fd = socket(AF_INET, SOCK_STREAM | SOCK_NONBLOCK, 0);
            if (fd < 0) return -1;
            int opt = 1;
            setsockopt(fd, SOL_SOCKET, SO_REUSEADDR, &opt, sizeof(opt));
            setsockopt(fd, IPPROTO_TCP, TCP_NODELAY, &opt, sizeof(opt));
            struct sockaddr_in addr;
            memset(&addr, 0, sizeof(addr));
            addr.sin_family = AF_INET;
            addr.sin_addr.s_addr = INADDR_ANY;
            addr.sin_port = htons(port);
            if (bind(fd, (struct sockaddr*)&addr, sizeof(addr)) < 0) {
                close(fd);
                return -1;
            }
            if (listen(fd, 100) < 0) {
                close(fd);
                return -1;
            }
            return fd;
        }
        
        server_t* server_create(int port, int max_workers, int max_conn,
                                const char *cert, const char *key) {
            server_t *s = calloc(1, sizeof(server_t));
            if (!s) return NULL;
            s->http_port = port;
            s->https_port = port + 443;
            s->worker_count = max_workers;
            s->max_conn = max_conn;
            s->has_ssl = 0;
            pthread_mutex_init(&s->conn_mutex, NULL);
            
            // 初始化SSL
            if (cert && key && access(cert, R_OK) == 0 && access(key, R_OK) == 0) {
                s->ssl_ctx = init_ssl(cert, key);
                if (s->ssl_ctx) {
                    strncpy(s->cert_file, cert, 255);
                    strncpy(s->key_file, key, 255);
                    s->https_fd = create_socket(s->https_port);
                    if (s->https_fd >= 0) {
                        s->has_ssl = 1;
                        syslog(LOG_INFO, "HTTPS on port %d", s->https_port);
                    }
                }
            }
            
            // HTTP
            s->http_fd = create_socket(s->http_port);
            if (s->http_fd >= 0) {
                syslog(LOG_INFO, "HTTP on port %d", s->http_port);
            }
            
            if (s->http_fd < 0 && s->https_fd < 0) {
                if (s->ssl_ctx) SSL_CTX_free(s->ssl_ctx);
                free(s);
                return NULL;
            }
            
            audio_worker_init(2);
            s->workers = malloc(sizeof(pthread_t) * max_workers);
            for (int i = 0; i < max_workers; i++) {
                pthread_create(&s->workers[i], NULL, worker_thread, s);
            }
            
            syslog(LOG_INFO, "Server created: HTTP=%d, HTTPS=%d", s->http_port, s->https_port);
            return s;
        }
        
        void server_destroy(server_t *s) {
            if (!s) return;
            s->running = 0;
            for (int i = 0; i < s->worker_count; i++) {
                pthread_join(s->workers[i], NULL);
            }
            if (s->http_fd >= 0) close(s->http_fd);
            if (s->https_fd >= 0) close(s->https_fd);
            if (s->ssl_ctx) SSL_CTX_free(s->ssl_ctx);
            pthread_mutex_destroy(&s->conn_mutex);
            free(s->workers);
            free(s);
            audio_worker_cleanup();
            syslog(LOG_INFO, "Server destroyed");
        }
        
        void server_run(server_t *s) {
            if (!s) return;
            s->running = 1;
            
            int epfd = epoll_create1(0);
            struct epoll_event ev, events[MAX_EVENTS];
            
            if (s->http_fd >= 0) {
                ev.events = EPOLLIN;
                ev.data.fd = s->http_fd;
                epoll_ctl(epfd, EPOLL_CTL_ADD, s->http_fd, &ev);
            }
            if (s->https_fd >= 0) {
                ev.events = EPOLLIN;
                ev.data.fd = s->https_fd;
                epoll_ctl(epfd, EPOLL_CTL_ADD, s->https_fd, &ev);
            }
            
            syslog(LOG_INFO, "Server running");
            
            while (s->running) {
                int n = epoll_wait(epfd, events, MAX_EVENTS, 100);
                for (int i = 0; i < n; i++) {
                    int fd = events[i].data.fd;
                    int is_https = (fd == s->https_fd);
                    
                    struct sockaddr_in addr;
                    socklen_t addr_len = sizeof(addr);
                    int client_fd = accept4(fd, (struct sockaddr*)&addr, &addr_len, SOCK_NONBLOCK);
                    if (client_fd < 0) continue;
                    
                    pthread_mutex_lock(&s->conn_mutex);
                    if (s->current_conn >= s->max_conn) {
                        pthread_mutex_unlock(&s->conn_mutex);
                        close(client_fd);
                        continue;
                    }
                    s->current_conn++;
                    pthread_mutex_unlock(&s->conn_mutex);
                    
                    client_t client;
                    client.fd = client_fd;
                    client.addr = addr;
                    client.is_https = is_https;
                    client.ssl = NULL;
                    
                    if (is_https && s->has_ssl && s->ssl_ctx) {
                        SSL *ssl = SSL_new(s->ssl_ctx);
                        if (ssl) {
                            SSL_set_fd(ssl, client_fd);
                            if (SSL_accept(ssl) <= 0) {
                                SSL_free(ssl);
                                close(client_fd);
                                pthread_mutex_lock(&s->conn_mutex);
                                s->current_conn--;
                                pthread_mutex_unlock(&s->conn_mutex);
                                continue;
                            }
                            client.ssl = ssl;
                        }
                    }
                    
                    enqueue_task(&client);
                }
            }
            close(epfd);
            syslog(LOG_INFO, "Server stopped");
        }
        
        void server_stop(server_t *s) {
            if (s) s->running = 0;
        }
        SERVER_EOF
        
        # ============================================
        # main.c
        # ============================================
        cat > src/main.c << 'MAIN_EOF'
        #include "notification_client.h"
        #include <stdio.h>
        #include <stdlib.h>
        #include <string.h>
        #include <unistd.h>
        #include <signal.h>
        #include <syslog.h>
        #include <getopt.h>
        #include <sys/stat.h>
        
        #define DEFAULT_PORT 8080
        #define DEFAULT_CERT "/etc/notification-client/server.crt"
        #define DEFAULT_KEY "/etc/notification-client/server.key"
        
        static int running = 1;
        
        void signal_handler(int sig) {
            if (sig == SIGINT || sig == SIGTERM) {
                syslog(LOG_INFO, "Shutting down...");
                running = 0;
            }
        }
        
        void daemonize(void) {
            pid_t pid = fork();
            if (pid < 0) { perror("fork"); exit(1); }
            if (pid > 0) exit(0);
            umask(0);
            if (setsid() < 0) { perror("setsid"); exit(1); }
            close(STDIN_FILENO);
            close(STDOUT_FILENO);
            close(STDERR_FILENO);
            openlog("notification-client", LOG_PID, LOG_DAEMON);
        }
        
        void usage(char *prog) {
            printf("Notification Client v%s\n", VERSION);
            printf("Usage: %s [OPTIONS]\n", prog);
            printf("  -d, --daemon          Run as daemon\n");
            printf("  -p, --port PORT       HTTP port (default: 8080)\n");
            printf("  -w, --workers N       Worker threads (default: 4)\n");
            printf("  --cert FILE           SSL certificate file\n");
            printf("  --key FILE            SSL private key file\n");
            printf("  -h, --help            Show help\n");
            printf("  -v, --version         Show version\n");
            printf("\nHTTPS port: HTTP port + 443 (e.g., 8443)\n");
        }
        
        int main(int argc, char *argv[]) {
            int port = DEFAULT_PORT;
            int daemon = 0;
            int workers = 4;
            int max_conn = 100;
            char *cert = DEFAULT_CERT;
            char *key = DEFAULT_KEY;
            
            static struct option long_opts[] = {
                {"daemon", no_argument, 0, 'd'},
                {"port", required_argument, 0, 'p'},
                {"workers", required_argument, 0, 'w'},
                {"cert", required_argument, 0, 1000},
                {"key", required_argument, 0, 1001},
                {"help", no_argument, 0, 'h'},
                {"version", no_argument, 0, 'v'},
                {0, 0, 0, 0}
            };
            
            int opt;
            while ((opt = getopt_long(argc, argv, "dp:w:hv", long_opts, NULL)) != -1) {
                switch (opt) {
                    case 'd': daemon = 1; break;
                    case 'p': port = atoi(optarg); break;
                    case 'w': workers = atoi(optarg); break;
                    case 1000: cert = optarg; break;
                    case 1001: key = optarg; break;
                    case 'h': usage(argv[0]); return 0;
                    case 'v': printf("Notification Client v%s\n", VERSION); return 0;
                    default: usage(argv[0]); return 1;
                }
            }
            
            if (daemon) daemonize();
            signal(SIGINT, signal_handler);
            signal(SIGTERM, signal_handler);
            signal(SIGHUP, signal_handler);
            
            syslog(LOG_INFO, "Starting Notification Client v%s", VERSION);
            
            server_t *s = server_create(port, workers, max_conn,
                                        access(cert, R_OK) == 0 ? cert : NULL,
                                        access(key, R_OK) == 0 ? key : NULL);
            if (!s) {
                syslog(LOG_ERR, "Server creation failed");
                return 1;
            }
            
            server_run(s);
            server_destroy(s);
            syslog(LOG_INFO, "Stopped");
            closelog();
            return 0;
        }
        MAIN_EOF
        
        echo "=== 源文件创建完成 ==="
        ls -la src/
        
    - name: Setup cross-compilation environment
      run: |
        echo "CC=mips64el-linux-gnuabi64-gcc" >> $GITHUB_ENV
        echo "CXX=mips64el-linux-gnuabi64-g++" >> $GITHUB_ENV
        echo "AR=mips64el-linux-gnuabi64-ar" >> $GITHUB_ENV
        echo "STRIP=mips64el-linux-gnuabi64-strip" >> $GITHUB_ENV
        
        # 添加头文件路径
        if [ -d "$PWD/deps/mips64el/usr/include" ]; then
          echo "CPPFLAGS=-I$PWD/deps/mips64el/usr/include" >> $GITHUB_ENV
        fi
        
        # 添加库路径
        if [ -d "$PWD/deps/mips64el/usr/lib/notification-client" ]; then
          echo "LDFLAGS=-L$PWD/deps/mips64el/usr/lib/notification-client -lpthread -ldl -lssl -lcrypto" >> $GITHUB_ENV
        fi
        
    - name: Create Makefile
      run: |
        rm -rf makefile Makefile Makefile.* notification-client package/
        rm -f notification-client_*.deb src/*.o
        
        cat > Makefile << 'MAKEFILE_EOF'
        CC = mips64el-linux-gnuabi64-gcc
        CXX = mips64el-linux-gnuabi64-g++
        AR = mips64el-linux-gnuabi64-ar
        STRIP = mips64el-linux-gnuabi64-strip
        
        CFLAGS = -Wall -O2 -march=mips64r2 -D_GNU_SOURCE -pthread
        LDFLAGS = -lpthread -ldl -lssl -lcrypto
        
        # 添加自定义头文件路径
        ifneq ($(wildcard deps/mips64el/usr/include),)
            CFLAGS += -I$(PWD)/deps/mips64el/usr/include
        endif
        
        # 添加自定义库路径
        ifneq ($(wildcard deps/mips64el/usr/lib/notification-client),)
            LDFLAGS += -L$(PWD)/deps/mips64el/usr/lib/notification-client
        endif
        
        SOURCES = src/main.c src/audio_worker.c src/server.c
        OBJECTS = $(SOURCES:.c=.o)
        TARGET = notification-client
        
        all: $(TARGET)
        
        $(TARGET): $(OBJECTS)
        	$(CC) $(CFLAGS) -o $@ $^ $(LDFLAGS)
        	@file $@
        
        %.o: %.c
        	$(CC) $(CFLAGS) -c $< -o $@
        
        clean:
        	rm -f $(OBJECTS) $(TARGET) notification-client_*.deb
        	rm -rf package/
        MAKEFILE_EOF
        
        cat Makefile
        
    - name: Build binary
      run: |
        make clean
        make
        file notification-client
        
    - name: Create DEB package
      run: |
        mkdir -p package/DEBIAN
        mkdir -p package/usr/bin
        mkdir -p package/usr/lib/notification-client/bin
        mkdir -p package/usr/lib/notification-client
        mkdir -p package/etc/notification-client
        mkdir -p package/usr/share/notification-client/sounds
        mkdir -p package/lib/systemd/system
        mkdir -p package/usr/share/doc/notification-client
        
        # 二进制
        cp notification-client package/usr/bin/
        ${STRIP} package/usr/bin/notification-client 2>/dev/null || true
        
        # 依赖库
        if [ -d "deps/mips64el/usr/lib/notification-client" ]; then
          cp -r deps/mips64el/usr/lib/notification-client/* package/usr/lib/notification-client/ 2>/dev/null || true
        fi
        
        chmod 755 package/usr/lib/notification-client/bin/* 2>/dev/null || true
        
        # SSL证书
        cp certs/server.crt package/etc/notification-client/
        cp certs/server.key package/etc/notification-client/
        chmod 600 package/etc/notification-client/server.key
        chmod 644 package/etc/notification-client/server.crt
        
        # 启动脚本
        cat > package/usr/bin/notification-client-wrapper << 'WRAPPER_EOF'
        #!/bin/bash
        export LD_LIBRARY_PATH=/usr/lib/notification-client:$LD_LIBRARY_PATH
        export PATH=/usr/lib/notification-client/bin:$PATH
        exec /usr/bin/notification-client --cert /etc/notification-client/server.crt --key /etc/notification-client/server.key "$@"
        WRAPPER_EOF
        chmod 755 package/usr/bin/notification-client-wrapper
        
        # 配置文件
        cat > package/etc/notification-client/config.json << 'EOF'
        {
          "default_sound": "/usr/share/notification-client/sounds/default.wav",
          "default_volume": 80,
          "http_port": 8080,
          "https_port": 8443,
          "audio_device": "default",
          "enable_wakeup": true,
          "ssl": {
            "cert": "/etc/notification-client/server.crt",
            "key": "/etc/notification-client/server.key"
          }
        }
        EOF
        
        # 默认声音
        if command -v sox > /dev/null; then
          sox -n package/usr/share/notification-client/sounds/default.wav synth 0.5 sine 800 2>/dev/null || true
        fi
        
        if [ ! -f package/usr/share/notification-client/sounds/default.wav ]; then
          dd if=/dev/zero of=package/usr/share/notification-client/sounds/default.wav bs=1 count=1000 2>/dev/null || true
        fi
        
        # systemd服务
        cat > package/lib/systemd/system/notification-client.service << 'SERVICE_EOF'
        [Unit]
        Description=Notification Client for Kylin V10 (HTTPS)
        After=network.target sound.target
        Wants=network.target

        [Service]
        Type=simple
        User=nobody
        Group=nogroup
        Environment="LD_LIBRARY_PATH=/usr/lib/notification-client"
        Environment="PATH=/usr/lib/notification-client/bin:/usr/bin:/bin"
        ExecStart=/usr/bin/notification-client-wrapper -d -p 8080 -w 4
        Restart=always
        RestartSec=10
        StandardOutput=syslog
        StandardError=syslog
        SyslogIdentifier=notification-client

        [Install]
        WantedBy=multi-user.target
        SERVICE_EOF
        
        # 文档
        cat > package/usr/share/doc/notification-client/README << 'README_EOF'
        Notification Client for Kylin V10 (MIPS64el) - HTTPS Enabled
        
        端口:
        - HTTP: 8080
        - HTTPS: 8443
        
        使用:
        sudo systemctl start notification-client
        curl http://localhost:8080/api/status
        curl -k https://localhost:8443/api/status
        curl -X POST -k https://localhost:8443/api/play
        
        浏览器访问: 
        - http://IP:8080
        - https://IP:8443 (需要添加证书例外)
        README_EOF
        
    - name: Create DEBIAN control
      run: |
        VERSION="3.0.0"
        if [ -n "${{ github.ref_type }}" ] && [ "${{ github.ref_type }}" = "tag" ]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        fi
        
        PKG_SIZE=$(du -sk package | cut -f1)
        
        cat > package/DEBIAN/control << CONTROL_EOF
        Package: notification-client
        Version: ${VERSION}
        Section: sound
        Priority: optional
        Architecture: mips64el
        Maintainer: ${GITHUB_ACTOR} <${GITHUB_ACTOR}@users.noreply.github.com>
        Installed-Size: ${PKG_SIZE}
        Depends: libc6 (>= 2.28), systemd, openssl
        Suggests: sox
        Description: Notification audio playback client for Kylin V10
         Full-featured notification client with HTTPS support.
         Features:
          - HTTP + HTTPS dual protocol support
          - Async audio playback with thread pool
          - Embedded audio players (aplay, paplay)
          - Auto-start at boot (systemd)
          - Force wakeup capability
          - Volume control
          - Self-signed SSL certificate included
          - All dependencies embedded
          - No network required for installation
        Homepage: https://github.com/${GITHUB_REPOSITORY}
        CONTROL_EOF
        
        cat > package/DEBIAN/postinst << 'POSTINST_EOF'
        #!/bin/bash
        set -e
        case "$1" in
            configure)
                mkdir -p /etc/notification-client
                mkdir -p /usr/share/notification-client/sounds
                mkdir -p /usr/lib/notification-client/bin
                
                if [ -d /usr/lib/notification-client ] && [ "$(ls -A /usr/lib/notification-client 2>/dev/null)" ]; then
                    echo "/usr/lib/notification-client" > /etc/ld.so.conf.d/notification-client.conf
                    ldconfig 2>/dev/null || true
                fi
                
                chmod 600 /etc/notification-client/server.key 2>/dev/null || true
                
                systemctl daemon-reload 2>/dev/null || true
                systemctl enable notification-client.service 2>/dev/null || true
                systemctl start notification-client.service 2>/dev/null || true
                ;;
        esac
        exit 0
        POSTINST_EOF
        chmod 755 package/DEBIAN/postinst
        
        cat > package/DEBIAN/prerm << 'PRERM_EOF'
        #!/bin/bash
        set -e
        case "$1" in
            remove)
                systemctl stop notification-client.service 2>/dev/null || true
                systemctl disable notification-client.service 2>/dev/null || true
                rm -f /etc/ld.so.conf.d/notification-client.conf 2>/dev/null || true
                ldconfig 2>/dev/null || true
                ;;
        esac
        exit 0
        PRERM_EOF
        chmod 755 package/DEBIAN/prerm
        
    - name: Build DEB
      run: |
        VERSION="3.0.0"
        if [ -n "${{ github.ref_type }}" ] && [ "${{ github.ref_type }}" = "tag" ]; then
          VERSION=${GITHUB_REF#refs/tags/v}
