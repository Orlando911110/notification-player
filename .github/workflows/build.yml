name: Build MIPS64el DEB Package (Debian Ports)

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Add MIPS64el architecture and Debian ports repository
      run: |
        # 1. 注册MIPS64el架构
        sudo dpkg --add-architecture mips64el
        
        # 2. 添加Debian Ports源（提供MIPS64el包）
        sudo tee /etc/apt/sources.list.d/debian-ports.list << 'EOF'
        # Debian Ports for MIPS64el
        deb [arch=mips64el] http://deb.debian.org/debian-ports sid main
        deb [arch=mips64el] http://deb.debian.org/debian-ports unreleased main
        EOF
        
        # 3. 配置APT优先使用Debian Ports源
        sudo tee /etc/apt/preferences.d/debian-ports << 'EOF'
        Package: *
        Pin: release o=Debian Ports
        Pin-Priority: 1001
        EOF
        
        # 4. 添加Debian Ports的GPG密钥
        sudo apt-get update || true
        sudo apt-get install -y debian-ports-archive-keyring || \
        wget -O- http://deb.debian.org/debian-ports/archive-keyring.gpg | sudo gpg --dearmor -o /usr/share/keyrings/debian-ports-archive-keyring.gpg
        
        # 5. 更新包列表
        sudo apt-get update
        
        # 6. 安装交叉编译工具链
        sudo apt-get install -y \
          crossbuild-essential-mips64el \
          dpkg-dev \
          debhelper \
          fakeroot \
          file \
          lintian \
          sox \
          libsox-dev \
          pkg-config
        
        # 7. 安装MIPS64el架构的开发库（从Debian Ports）
        sudo apt-get install -y \
          libpulse-dev:mips64el \
          libasound2-dev:mips64el \
          libjson-c-dev:mips64el
        
        # 8. 验证安装
        echo "=== Verifying installed packages ==="
        dpkg -l | grep -E "(libpulse|libasound|libjson-c).*mips64el" || true
        echo "=== Cross compiler version ==="
        mips64el-linux-gnuabi64-gcc --version || true
        
        # 9. 检查库文件位置
        echo "=== Library locations ==="
        find /usr/lib/mips64el-linux-gnuabi64 -name "*.so" 2>/dev/null | head -10 || true
        find /usr/include -name "pulse" -type d 2>/dev/null | head -5 || true
      
    - name: Setup cross-compilation environment
      run: |
        echo "CC=mips64el-linux-gnuabi64-gcc" >> $GITHUB_ENV
        echo "CXX=mips64el-linux-gnuabi64-g++" >> $GITHUB_ENV
        echo "AR=mips64el-linux-gnuabi64-ar" >> $GITHUB_ENV
        echo "STRIP=mips64el-linux-gnuabi64-strip" >> $GITHUB_ENV
        echo "PKG_CONFIG_PATH=/usr/lib/mips64el-linux-gnuabi64/pkgconfig" >> $GITHUB_ENV
        echo "PKG_CONFIG_LIBDIR=/usr/lib/mips64el-linux-gnuabi64/pkgconfig" >> $GITHUB_ENV
        echo "PKG_CONFIG_SYSROOT_DIR=/" >> $GITHUB_ENV
        
        # 验证pkg-config
        echo "=== Verifying pkg-config ==="
        export PKG_CONFIG_PATH=/usr/lib/mips64el-linux-gnuabi64/pkgconfig
        export PKG_CONFIG_LIBDIR=/usr/lib/mips64el-linux-gnuabi64/pkgconfig
        pkg-config --list-all | grep -E "(pulse|alsa|json)" || true
        
    - name: Update Makefile for cross-compilation
      run: |
        # 创建支持交叉编译的Makefile
        cat > Makefile.cross << 'EOF'
        # Cross-compilation Makefile for MIPS64el
        CC = mips64el-linux-gnuabi64-gcc
        CXX = mips64el-linux-gnuabi64-g++
        AR = mips64el-linux-gnuabi64-ar
        STRIP = mips64el-linux-gnuabi64-strip
        PKG_CONFIG = pkg-config
        
        CFLAGS = -Wall -O2 -march=mips64el -mtune=mips64el -D_GNU_SOURCE
        LDFLAGS = -lpthread
        
        # 使用pkg-config获取库路径
        PULSE_CFLAGS = $(shell PKG_CONFIG_PATH=/usr/lib/mips64el-linux-gnuabi64/pkgconfig $(PKG_CONFIG) --cflags libpulse 2>/dev/null || echo "")
        PULSE_LIBS = $(shell PKG_CONFIG_PATH=/usr/lib/mips64el-linux-gnuabi64/pkgconfig $(PKG_CONFIG) --libs libpulse 2>/dev/null || echo "-lpulse")
        ALSA_CFLAGS = $(shell PKG_CONFIG_PATH=/usr/lib/mips64el-linux-gnuabi64/pkgconfig $(PKG_CONFIG) --cflags alsa 2>/dev/null || echo "")
        ALSA_LIBS = $(shell PKG_CONFIG_PATH=/usr/lib/mips64el-linux-gnuabi64/pkgconfig $(PKG_CONFIG) --libs alsa 2>/dev/null || echo "-lasound")
        JSON_CFLAGS = $(shell PKG_CONFIG_PATH=/usr/lib/mips64el-linux-gnuabi64/pkgconfig $(PKG_CONFIG) --cflags json-c 2>/dev/null || echo "")
        JSON_LIBS = $(shell PKG_CONFIG_PATH=/usr/lib/mips64el-linux-gnuabi64/pkgconfig $(PKG_CONFIG) --libs json-c 2>/dev/null || echo "-ljson-c")
        
        CFLAGS += $(PULSE_CFLAGS) $(ALSA_CFLAGS) $(JSON_CFLAGS)
        LDFLAGS += $(PULSE_LIBS) $(ALSA_LIBS) $(JSON_LIBS)
        
        SOURCES = src/main.c src/audio.c src/http_server.c src/config.c
        OBJECTS = $(SOURCES:.c=.o)
        TARGET = notification-client
        
        all: $(TARGET)
        
        $(TARGET): $(OBJECTS)
        	$(CC) $(CFLAGS) -o $@ $^ $(LDFLAGS)
        	@echo "Build complete: $@"
        	@file $@
        
        %.o: %.c
        	$(CC) $(CFLAGS) -c $< -o $@
        
        clean:
        	rm -f $(OBJECTS) $(TARGET)
        EOF
        
        # 使用交叉编译Makefile
        cp Makefile.cross Makefile
        
        # 显示Makefile内容以便调试
        echo "=== Makefile content ==="
        cat Makefile
        
    - name: Build binary
      run: |
        make clean
        make
        file notification-client
        ldd notification-client || echo "Not a host binary, cross-compiled for MIPS64el"
        
    - name: Create package structure
      run: |
        mkdir -p package/DEBIAN
        mkdir -p package/usr/bin
        mkdir -p package/etc/notification-client
        mkdir -p package/usr/share/notification-client/sounds
        mkdir -p package/lib/systemd/system
        mkdir -p package/usr/share/doc/notification-client
        
        cp notification-client package/usr/bin/
        ${STRIP} package/usr/bin/notification-client 2>/dev/null || true
        
        # 创建默认配置文件
        cat > package/etc/notification-client/config.json << 'EOF'
        {
          "default_sound": "/usr/share/notification-client/sounds/default.wav",
          "default_volume": 80,
          "http_port": 8080,
          "audio_device": "default",
          "enable_wakeup": true,
          "custom_sounds": [
            "/usr/share/notification-client/sounds/urgent.wav",
            "/usr/share/notification-client/sounds/gentle.wav"
          ]
        }
        EOF
        
        # 创建默认声音文件
        if command -v sox > /dev/null; then
          sox -n package/usr/share/notification-client/sounds/default.wav synth 0.5 sine 800 2>/dev/null || true
        fi
        
        # 创建systemd服务文件
        cat > package/lib/systemd/system/notification-client.service << 'EOF'
        [Unit]
        Description=Notification Client Service
        After=network.target sound.target
        Wants=network.target

        [Service]
        Type=simple
        User=nobody
        Group=nogroup
        ExecStart=/usr/bin/notification-client -d -c /etc/notification-client/config.json
        Restart=always
        RestartSec=10
        StandardOutput=syslog
        StandardError=syslog
        SyslogIdentifier=notification-client

        [Install]
        WantedBy=multi-user.target
        EOF
        
    - name: Create DEBIAN control file
      run: |
        VERSION="1.0.0"
        if [ -n "${{ github.ref_type }}" ] && [ "${{ github.ref_type }}" = "tag" ]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        fi
        
        cat > package/DEBIAN/control << EOF
        Package: notification-client
        Version: ${VERSION}
        Section: sound
        Priority: optional
        Architecture: mips64el
        Maintainer: ${GITHUB_ACTOR} <${GITHUB_ACTOR}@users.noreply.github.com>
        Depends: libc6 (>= 2.28), libpulse0 (>= 13.0), libasound2 (>= 1.2), libjson-c5 (>= 0.13.1), systemd
        Suggests: sox
        Description: Notification audio playback client with HTTP API
         This package provides a daemon that plays notification sounds
         triggered via HTTP API. Features include:
          - HTTP REST API for remote triggering
          - Auto-start at boot
          - Force wakeup capability
          - Volume control
          - Custom sound support
          - Systemd integration
        Homepage: https://github.com/${GITHUB_REPOSITORY}
EOF
        
    - name: Create postinst script
      run: |
        cat > package/DEBIAN/postinst << 'EOF'
        #!/bin/bash
        set -e
        case "$1" in
            configure)
                mkdir -p /etc/notification-client
                mkdir -p /usr/share/notification-client/sounds
                if [ ! -f /usr/share/notification-client/sounds/default.wav ] && command -v sox > /dev/null; then
                    sox -n /usr/share/notification-client/sounds/default.wav synth 0.5 sine 800 2>/dev/null || true
                fi
                if [ -f /lib/systemd/system/notification-client.service ]; then
                    systemctl daemon-reload 2>/dev/null || true
                    systemctl enable notification-client.service 2>/dev/null || true
                    systemctl start notification-client.service 2>/dev/null || true
                fi
                ;;
        esac
        exit 0
        EOF
        chmod 755 package/DEBIAN/postinst
        
    - name: Create prerm script
      run: |
        cat > package/DEBIAN/prerm << 'EOF'
        #!/bin/bash
        set -e
        case "$1" in
            remove)
                if [ -f /lib/systemd/system/notification-client.service ]; then
                    systemctl stop notification-client.service 2>/dev/null || true
                    systemctl disable notification-client.service 2>/dev/null || true
                fi
                ;;
        esac
        exit 0
        EOF
        chmod 755 package/DEBIAN/prerm
        
    - name: Build DEB package
      run: |
        VERSION="1.0.0"
        if [ -n "${{ github.ref_type }}" ] && [ "${{ github.ref_type }}" = "tag" ]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        fi
        fakeroot dpkg-deb --build package notification-client_${VERSION}_mips64el.deb
        file notification-client_${VERSION}_mips64el.deb
        dpkg-deb --info notification-client_${VERSION}_mips64el.deb
        dpkg-deb --contents notification-client_${VERSION}_mips64el.deb
        
    - name: Lintian check
      run: |
        if [ -f notification-client_*.deb ]; then
          lintian notification-client_*.deb 2>/dev/null || true
        fi
        
    - name: Upload DEB artifact
      uses: actions/upload-artifact@v4
      with:
        name: notification-client-mips64el
        path: notification-client_*.deb
        if-no-files-found: error
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: notification-client_*.deb
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
