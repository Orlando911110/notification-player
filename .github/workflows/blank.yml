name: Build MIPS64 DEB Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MIPS64 cross-compilation environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc-mips64-linux-gnuabi64 \
          g++-mips64-linux-gnuabi64 \
          build-essential \
          debhelper \
          devscripts \
          cmake \
          pkg-config \
          fakeroot \
          lintian \
          dpkg-dev \
          wget \
          curl
    
    - name: Install MIPS64 dependencies manually
      run: |
        # Create sysroot directory for MIPS64
        mkdir -p ${{ github.workspace }}/mips64-sysroot
        
        # Download and extract MIPS64 libraries
        cd ${{ github.workspace }}/mips64-sysroot
        
        # Add Debian MIPS64 architecture
        sudo dpkg --add-architecture mips64
        sudo apt-get update
        
        # Install essential MIPS64 libraries
        sudo apt-get install -y \
          libc6-dev:mips64 \
          libgtk-3-dev:mips64 \
          libnotify-dev:mips64 \
          libcurl4-openssl-dev:mips64 \
          libjson-c-dev:mips64 \
          libmicrohttpd-dev:mips64 \
          libao-dev:mips64 \
          libmpg123-dev:mips64 \
          libssl-dev:mips64 || true
        
        # If multiarch fails, download and extract manually
        if [ $? -ne 0 ]; then
          echo "Multiarch installation failed, downloading packages manually..."
          
          # Create directories for libraries
          mkdir -p usr/lib/mips64-linux-gnuabi64
          mkdir -p usr/include
          
          # Download packages
          for pkg in libgtk-3-0 libnotify4 libcurl4 libjson-c4 libmicrohttpd12 libao4 libmpg123-0; do
            wget -q "http://ftp.debian.org/debian/pool/main/${pkg:0:4}/${pkg}_*_mips64.deb" || true
          done
          
          # Extract libraries
          for deb in *.deb; do
            if [ -f "$deb" ]; then
              dpkg-deb -x "$deb" .
            fi
          done
        fi
    
    - name: Create CMake toolchain file for MIPS64
      run: |
        cat > ${{ github.workspace }}/mips64-toolchain.cmake << 'EOF'
        set(CMAKE_SYSTEM_NAME Linux)
        set(CMAKE_SYSTEM_PROCESSOR mips64)
        
        # Compiler settings
        set(CMAKE_C_COMPILER mips64-linux-gnuabi64-gcc)
        set(CMAKE_CXX_COMPILER mips64-linux-gnuabi64-g++)
        
        # Search paths
        set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
        set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
        set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
        set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
        
        # System root
        set(CMAKE_SYSROOT ${{ github.workspace }}/mips64-sysroot)
        
        # Compiler flags
        set(CMAKE_C_FLAGS "${CMAKE_C_FLAGS} -mabi=64 -march=mips64r2" CACHE STRING "" FORCE)
        set(CMAKE_CXX_FLAGS "${CMAKE_CXX_FLAGS} -mabi=64 -march=mips64r2" CACHE STRING "" FORCE)
        EOF
    
    - name: Create static libraries bundle script
      run: |
        cat > ${{ github.workspace }}/bundle-libs.sh << 'EOF'
        #!/bin/bash
        # Script to bundle all dependencies
        
        BUNDLE_DIR="$1"
        TARGET_BINARY="$2"
        
        mkdir -p "$BUNDLE_DIR/usr/lib/mips64-linux-gnuabi64"
        
        # Copy binary
        cp "$TARGET_BINARY" "$BUNDLE_DIR/usr/local/bin/"
        
        # Find and copy required shared libraries
        if command -v mips64-linux-gnuabi64-objdump &> /dev/null; then
          LIBS=$(mips64-linux-gnuabi64-objdump -p "$TARGET_BINARY" | grep NEEDED | awk '{print $2}')
          
          for lib in $LIBS; do
            find /usr/mips64-linux-gnuabi64/lib /usr/lib/mips64-linux-gnuabi64 -name "$lib*" -exec cp {} "$BUNDLE_DIR/usr/lib/mips64-linux-gnuabi64/" \; 2>/dev/null || true
          done
        else
          # If objdump not available, copy common libraries
          cp /usr/mips64-linux-gnuabi64/lib/*.so* "$BUNDLE_DIR/usr/lib/mips64-linux-gnuabi64/" 2>/dev/null || true
        fi
        
        # Create ld.so.conf for bundled libs
        echo "/usr/lib/mips64-linux-gnuabi64" > "$BUNDLE_DIR/etc/ld.so.conf.d/player-client.conf"
        EOF
        
        chmod +x ${{ github.workspace }}/bundle-libs.sh
    
    - name: Configure with CMake
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/mips64-toolchain.cmake \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr/local \
          -DBUILD_SHARED_LIBS=OFF \
          -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"
    
    - name: Build
      run: |
        cd build
        make -j$(nproc)
        make install DESTDIR=${{ github.workspace }}/install
    
    - name: Prepare DEB package structure
      run: |
        # Create package directory
        PKG_DIR="${{ github.workspace }}/player-client_1.0.2_mips64"
        mkdir -p "$PKG_DIR/DEBIAN"
        mkdir -p "$PKG_DIR/usr/local/bin"
        mkdir -p "$PKG_DIR/usr/share/player-client/sounds"
        mkdir -p "$PKG_DIR/etc/player-client"
        mkdir -p "$PKG_DIR/lib/systemd/system"
        mkdir -p "$PKG_DIR/usr/share/applications"
        mkdir -p "$PKG_DIR/usr/share/doc/player-client"
        mkdir -p "$PKG_DIR/usr/lib/mips64-linux-gnuabi64"
        
        # Copy binary
        cp ${{ github.workspace }}/build/player-client "$PKG_DIR/usr/local/bin/"
        chmod 755 "$PKG_DIR/usr/local/bin/player-client"
        
        # Copy service file
        cp ${{ github.workspace }}/debian/player-client.service "$PKG_DIR/lib/systemd/system/"
        
        # Copy desktop file
        cp ${{ github.workspace }}/debian/player-client.desktop "$PKG_DIR/usr/share/applications/"
        
        # Create default config
        echo '{"port": 8080, "sound_dir": "/usr/share/player-client/sounds", "default_volume": 80}' > "$PKG_DIR/etc/player-client/config.json"
        
        # Create a sample notification sound (silent WAV)
        python3 -c "
        import struct, wave
        with wave.open('$PKG_DIR/usr/share/player-client/sounds/default.wav', 'w') as f:
            f.setnchannels(1)
            f.setsampwidth(2)
            f.setframerate(44100)
            f.writeframes(struct.pack('h', 0) * 44100)
        " 2>/dev/null || touch "$PKG_DIR/usr/share/player-client/sounds/default.wav"
        
        # Bundle shared libraries
        if [ -d "${{ github.workspace }}/mips64-sysroot/usr/lib" ]; then
          cp -r ${{ github.workspace }}/mips64-sysroot/usr/lib/* "$PKG_DIR/usr/lib/mips64-linux-gnuabi64/" 2>/dev/null || true
        fi
        
        # Create ld.so.conf for bundled libraries
        mkdir -p "$PKG_DIR/etc/ld.so.conf.d"
        echo "/usr/lib/mips64-linux-gnuabi64" > "$PKG_DIR/etc/ld.so.conf.d/player-client.conf"
        
        # Calculate installed size
        INSTALLED_SIZE=$(du -sk "$PKG_DIR" | cut -f1)
        
        # Create control file with correct size
        cat > "$PKG_DIR/DEBIAN/control" << EOF
Package: player-client
Version: 1.0.2
Architecture: mips64
Maintainer: PlayerClient Team <support@playerclient.com>
Installed-Size: ${INSTALLED_SIZE}
Depends: libc6 (>= 2.17), systemd
Recommends: libgtk-3-0, libnotify4, libcurl4, libjson-c4, libmicrohttpd12, libao4, libmpg123-0
Section: sound
Priority: optional
Homepage: https://github.com/${{ github.repository }}
Description: 消息通知播放客户端
 PlayerClient - 消息通知播放客户端，支持 HTTP API 远程触发音频播放。
 .
 主要功能包括：
  - HTTP RESTful API 远程控制音频播放
  - 支持 MP3/WAV 音频格式
  - 桌面通知集成
  - 系统托盘图标支持
  - 开机自启动 (systemd 服务)
  - 音量控制
  - CORS 支持
  - 所有依赖库已打包在内
EOF
        
        # Create postinst script
        cat > "$PKG_DIR/DEBIAN/postinst" << 'SCRIPT'
#!/bin/bash
set -e

# Update library cache
if [ -x "/sbin/ldconfig" ]; then
    /sbin/ldconfig
fi

# Enable and start systemd service
if [ -x "/bin/systemctl" ]; then
    systemctl daemon-reload
    systemctl enable player-client.service || true
    systemctl start player-client.service || true
fi

echo ""
echo "PlayerClient 安装成功！"
echo "========================="
echo "HTTP API 地址: http://localhost:8080"
echo "配置文件: /etc/player-client/config.json"
echo "音频文件目录: /usr/share/player-client/sounds"
echo ""
echo "API 使用示例:"
echo "  curl -X POST http://localhost:8080/api/play"
echo "  curl http://localhost:8080/api/status"
echo ""

exit 0
SCRIPT
        
        # Create prerm script
        cat > "$PKG_DIR/DEBIAN/prerm" << 'SCRIPT'
#!/bin/bash
set -e

# Stop and disable service before removal
if [ -x "/bin/systemctl" ] && [ -f /lib/systemd/system/player-client.service ]; then
    systemctl stop player-client.service || true
    systemctl disable player-client.service || true
    systemctl daemon-reload
fi

exit 0
SCRIPT
        
        # Make scripts executable
        chmod 755 "$PKG_DIR/DEBIAN/postinst" "$PKG_DIR/DEBIAN/prerm"
        
        # Create README
        cat > "$PKG_DIR/usr/share/doc/player-client/README" << EOF
PlayerClient v1.0.2
==================

消息通知播放客户端，支持 HTTP API 远程触发音频播放。

API 端点：
- POST /api/play    - 播放音频
- GET  /api/status  - 获取状态
- GET  /api/stop    - 停止播放
- POST /api/volume  - 设置音量

配置文件：/etc/player-client/config.json
音频目录：/usr/share/player-client/sounds

对于 MIPS64 架构的详细支持，请访问：
https://github.com/${{ github.repository }}
EOF
    
    - name: Build DEB package
      run: |
        # Build the package
        dpkg-deb --build ${{ github.workspace }}/player-client_1.0.2_mips64
        
        # Check package
        if command -v lintian &> /dev/null; then
          lintian ${{ github.workspace }}/player-client_1.0.2_mips64.deb || true
        fi
        
        # Show package info
        dpkg-deb --info ${{ github.workspace }}/player-client_1.0.2_mips64.deb
        echo ""
        echo "Package contents:"
        dpkg-deb --contents ${{ github.workspace }}/player-client_1.0.2_mips64.deb
    
    - name: Upload DEB package
      uses: actions/upload-artifact@v4
      with:
        name: player-client-mips64-deb
        path: ${{ github.workspace }}/player-client_1.0.2_mips64.deb
        retention-days: 30
        compression-level: 6
    
    - name: Create checksum
      run: |
        cd ${{ github.workspace }}
        sha256sum player-client_1.0.2_mips64.deb > player-client_1.0.2_mips64.deb.sha256
        md5sum player-client_1.0.2_mips64.deb > player-client_1.0.2_mips64.deb.md5
    
    - name: Upload checksums
      uses: actions/upload-artifact@v4
      with:
        name: player-client-checksums
        path: |
          ${{ github.workspace }}/player-client_1.0.2_mips64.deb.sha256
          ${{ github.workspace }}/player-client_1.0.2_mips64.deb.md5
        retention-days: 30
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        name: PlayerClient v1.0.2
        body: |
          # PlayerClient v1.0.2 - MIPS64 版本
          
          ## 新增功能
          - 完整 MIPS64 架构支持
          - HTTP API 远程音频播放控制
          - 所有依赖库打包在内
          - systemd 服务自动启动
          
          ## 安装方法
          ```bash
          sudo dpkg -i player-client_1.0.2_mips64.deb
          sudo systemctl enable player-client
          sudo systemctl start player-client
