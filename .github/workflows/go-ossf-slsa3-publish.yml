name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for MIPS64el
    runs-on: ubuntu-20.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.19'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential debhelper fakeroot

    - name: Build
      run: |
        make build
        make deb

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: notification-player
        path: |
          bin/
          *.deb
          dist/

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          *.deb
          bin/notification-player
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mips:
    name: Build for MIPS64el (Cross Compile)
    runs-on: ubuntu-20.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.19'

    - name: Build for MIPS64el
      run: |
        GOOS=linux GOARCH=mips64le go build -o bin/notification-player-mips64el cmd/notification-player/main.go

    - name: Upload MIPS64el binary
      uses: actions/upload-artifact@v3
      with:
        name: notification-player-mips64el
        path: bin/notification-player-mips64el
